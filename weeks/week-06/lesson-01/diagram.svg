<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="28" fill="#ffffff"/>
  <text x="400" y="45" text-anchor="middle" font-size="22" font-weight="700" font-family="Tajawal, sans-serif" fill="#111827">تدفق البيانات مع API Resources</text>

  <!-- Database box -->
  <rect x="50" y="90" width="180" height="100" rx="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="130" text-anchor="middle" font-size="16" font-weight="700" font-family="Tajawal, sans-serif" fill="#1e40af">قاعدة البيانات</text>
  <text x="140" y="155" text-anchor="middle" font-size="12" font-family="Tajawal, sans-serif" fill="#1e40af">15 عموداً (كل الحقول)</text>
  <text x="140" y="175" text-anchor="middle" font-size="11" font-family="Tajawal, sans-serif" fill="#64748b">(بيانات خام + حساسة)</text>

  <!-- Arrow -->
  <path d="M 230 140 L 295 140" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Resource filter box -->
  <rect x="300" y="80" width="200" height="120" rx="20" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/>
  <text x="400" y="120" text-anchor="middle" font-size="16" font-weight="700" font-family="Tajawal, sans-serif" fill="#4338ca">API Resource</text>
  <text x="400" y="145" text-anchor="middle" font-size="12" font-family="Tajawal, sans-serif" fill="#6366f1">(الفلتر)</text>
  <text x="400" y="165" text-anchor="middle" font-size="11" font-family="Tajawal, sans-serif" fill="#64748b">يختار: id, name, status</text>
  <text x="400" y="182" text-anchor="middle" font-size="11" font-family="Tajawal, sans-serif" fill="#64748b">يحسب: tasks_count</text>

  <!-- Arrow -->
  <path d="M 500 140 L 565 140" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- React UI box -->
  <rect x="570" y="90" width="180" height="100" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="660" y="130" text-anchor="middle" font-size="16" font-weight="700" font-family="Tajawal, sans-serif" fill="#065f46">واجهة React</text>
  <text x="660" y="155" text-anchor="middle" font-size="12" font-family="Tajawal, sans-serif" fill="#065f46">5 حقول فقط</text>
  <text x="660" y="175" text-anchor="middle" font-size="11" font-family="Tajawal, sans-serif" fill="#64748b">(بيانات نظيفة)</text>

  <!-- FlowPilot result -->
  <rect x="200" y="280" width="400" height="70" rx="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="310" text-anchor="middle" font-size="15" font-weight="700" font-family="Tajawal, sans-serif" fill="#15803d">نتيجة: تنظيم بيانات FlowPilot</text>
  <text x="400" y="335" text-anchor="middle" font-size="12" font-family="Tajawal, sans-serif" fill="#15803d">إرسال نظيف ← أداء أسرع ← أمان أعلى</text>

  <path d="M 400 200 L 400 275" stroke="#0f172a" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f172a"/>
    </marker>
  </defs>
</svg>