<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" rx="24" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="700" font-family="Tajawal, sans-serif" fill="#111827">مثال بصري: من البيانات الخام إلى النظيفة</text>

  <!-- Before box -->
  <rect x="40" y="75" width="330" height="180" rx="16" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="205" y="105" text-anchor="middle" font-size="14" font-weight="700" font-family="Tajawal, sans-serif" fill="#dc2626">قبل Resource (بيانات خام)</text>
  <text x="55" y="135" font-size="11" font-family="Consolas, monospace" fill="#64748b">{</text>
  <text x="55" y="152" font-size="11" font-family="Consolas, monospace" fill="#64748b">  "id": 1,</text>
  <text x="55" y="169" font-size="11" font-family="Consolas, monospace" fill="#64748b">  "name": "التطبيق",</text>
  <text x="55" y="186" font-size="11" font-family="Consolas, monospace" fill="#64748b">  "password": "123456",  ← خطر!</text>
  <text x="55" y="203" font-size="11" font-family="Consolas, monospace" fill="#64748b">  "internal_code": "X99",  ← غير ضروري</text>
  <text x="55" y="220" font-size="11" font-family="Consolas, monospace" fill="#64748b">  "is_admin": 1,  ← حساس!</text>
  <text x="55" y="237" font-size="11" font-family="Consolas, monospace" fill="#64748b">  ... 10+ حقل آخر</text>
  <text x="55" y="254" font-size="11" font-family="Consolas, monospace" fill="#64748b">}</text>

  <!-- Arrow -->
  <text x="390" y="160" text-anchor="middle" font-size="30" fill="#6366f1">⟶</text>

  <!-- After box -->
  <rect x="430" y="75" width="330" height="180" rx="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="595" y="105" text-anchor="middle" font-size="14" font-weight="700" font-family="Tajawal, sans-serif" fill="#16a34a">بعد Resource (بيانات نظيفة)</text>
  <text x="445" y="135" font-size="11" font-family="Consolas, monospace" fill="#64748b">{</text>
  <text x="445" y="152" font-size="11" font-family="Consolas, monospace" fill="#22c55e">  "id": 1,</text>
  <text x="445" y="169" font-size="11" font-family="Consolas, monospace" fill="#22c55e">  "name": "التطبيق",</text>
  <text x="445" y="186" font-size="11" font-family="Consolas, monospace" fill="#22c55e">  "status": "active",</text>
  <text x="445" y="203" font-size="11" font-family="Consolas, monospace" fill="#22c55e">  "tasks_count": 5,</text>
  <text x="445" y="220" font-size="11" font-family="Consolas, monospace" fill="#22c55e">  "created_at": "2025-06-19"</text>
  <text x="445" y="237" font-size="11" font-family="Consolas, monospace" fill="#64748b">}</text>
  <text x="445" y="254" font-size="10" font-family="Tajawal, sans-serif" fill="#16a34a">نظيف، آمن، ومنسق!</text>

  <text x="400" y="290" text-anchor="middle" font-size="11" font-family="Tajawal, sans-serif" fill="#94a3b8">تذكير: الـ Resource يزيل الحساس وغير الضروري ويضيف المحسوب</text>
</svg>