<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" rx="24" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="700" font-family="Tajawal, sans-serif" fill="#111827">مثال: قبل وبعد البحث والفلاتر</text>

  <!-- Before -->
  <rect x="40" y="70" width="340" height="200" rx="16" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="210" y="100" text-anchor="middle" font-size="14" font-weight="700" font-family="Tajawal, sans-serif" fill="#dc2626">بدون فلاتر (كل المشاريع)</text>
  <text x="55" y="130" font-size="12" font-family="Tajawal, sans-serif" fill="#64748b">📁 مشروع 1 - تصميم موقع</text>
  <text x="55" y="150" font-size="12" font-family="Tajawal, sans-serif" fill="#64748b">📁 مشروع 2 - تطبيق جوال</text>
  <text x="55" y="170" font-size="12" font-family="Tajawal, sans-serif" fill="#64748b">📁 مشروع 3 - تسويق</text>
  <text x="55" y="190" font-size="12" font-family="Tajawal, sans-serif" fill="#64748b">📁 مشروع 4 - صيانة سيرفرات</text>
  <text x="55" y="210" font-size="12" font-family="Tajawal, sans-serif" fill="#64748b">📁 مشروع 5 - تدريب فريق</text>
  <text x="55" y="235" font-size="12" font-family="Tajawal, sans-serif" fill="#ef4444">⬅ 50+ مشروعاً يصعب تصفحها</text>

  <!-- Arrow -->
  <text x="395" y="170" text-anchor="middle" font-size="28" fill="#6366f1">⟶</text>

  <!-- After -->
  <rect x="420" y="70" width="340" height="200" rx="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="100" text-anchor="middle" font-size="14" font-weight="700" font-family="Tajawal, sans-serif" fill="#16a34a">مع الفلاتر (نتائج محددة)</text>
  <text x="590" y="125" text-anchor="middle" font-size="11" font-family="Tajawal, sans-serif" fill="#94a3b8">🔍 بحث: "تصميم" + الحالة: نشط</text>
  <text x="435" y="155" font-size="12" font-family="Tajawal, sans-serif" fill="#22c55e">📁 مشروع 1 - تصميم موقع ← نشط</text>
  <text x="435" y="180" font-size="12" font-family="Tajawal, sans-serif" fill="#22c55e">📁 مشروع 6 - تصميم شعار ← نشط</text>
  <text x="435" y="205" font-size="12" font-family="Tajawal, sans-serif" fill="#22c55e">📁 مشروع 8 - تصميم واجهة ← نشط</text>
  <text x="435" y="235" font-size="12" font-family="Tajawal, sans-serif" fill="#16a34a">⬅ 3 نتائج فقط، سهلة التصفح!</text>

  <text x="400" y="285" text-anchor="middle" font-size="11" font-family="Tajawal, sans-serif" fill="#94a3b8">الفلاتر تحول 50 مشروعاً إلى 3 نتائج محددة</text>
</svg>