<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>واجب الدرس 14: كتابة قواعد الصلاحيات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-['Tajawal',sans-serif]">
<main class="mx-auto max-w-3xl px-4 py-12">
    <div class="card p-12 space-y-8">
        <h1 class="text-3xl font-black text-center text-indigo-600">واجب حارس البوابة</h1>
        <div class="space-y-6 text-right">
            <h3 class="font-black text-xl">تحدي المبرمج:</h3>
            <ol class="list-decimal pr-6 space-y-4 font-bold text-slate-700">
                <li>أنشئ <code>ProjectPolicy</code>.</li>
                <li>اكتب قاعدة تسمح بحذف المشروع (Delete) فقط إذا كان المستخدم "مديراً" (يمكنك افتراض وجود عمود <code>is_admin</code> في جدول المستخدمين).</li>
                <li>اشرح لزميلك: لماذا لا نكتب هذه الشروط داخل الـ Controller مباشرة؟</li>
            </ol>
        </div>
    </div>
</main>
</body>
</html>
