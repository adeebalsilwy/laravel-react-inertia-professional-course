<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ecfdf5" rx="20"/>
  
  <text x="400" y="40" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="22" fill="#064e3b">كيف تعمل Policies في Laravel</text>
  
  <!-- User box -->
  <rect x="30" y="80" width="160" height="100" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="110" y="120" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="14" fill="#065f46">المستخدم (User)</text>
  <text x="110" y="145" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="11" fill="#047857">يحاول تحديث مشروع</text>
  
  <path d="M 190 130 L 240 130" stroke="#10b981" stroke-width="2" marker-end="url(#ar2)"/>
  
  <!-- Controller -->
  <rect x="250" y="80" width="160" height="100" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="330" y="115" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#065f46">ProjectController</text>
  <text x="330" y="138" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#047857">$this-&gt;authorize(</text>
  <text x="330" y="152" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#047857">'update', $project)</text>
  
  <path d="M 410 130 L 460 130" stroke="#10b981" stroke-width="2" marker-end="url(#ar2)"/>
  
  <!-- Policy -->
  <rect x="470" y="80" width="160" height="100" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="550" y="110" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#065f46">ProjectPolicy</text>
  <text x="550" y="132" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#047857">update(User $user,</text>
  <text x="550" y="148" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#047857">Project $project)</text>
  <text x="550" y="168" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#047857">return $user-&gt;id === $project-&gt;user_id</text>
  
  <!-- Decision diamond -->
  <polygon points="630,180 670,220 630,260 590,220" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="630" y="218" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="11" fill="#92400e">نعم/لا</text>
  
  <path d="M 550 180 L 590 220" stroke="#10b981" stroke-width="2"/>
  
  <!-- True path -->
  <path d="M 670 220 L 730 220 L 730 120 L 630 120" stroke="#22c55e" stroke-width="3" fill="none" marker-end="url(#ar3)"/>
  <text x="750" y="170" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="11" fill="#15803d" transform="rotate(90, 750, 170)">true → يتم التحديث</text>
  
  <!-- False path -->
  <path d="M 630 260 L 630 340 L 50 340 L 50 180" stroke="#ef4444" stroke-width="3" fill="none" stroke-dasharray="5 5" marker-end="url(#ar4)"/>
  <text x="340" y="358" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="11" fill="#dc2626">false → 403 Forbidden</text>
  
  <defs>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#10b981"/></marker>
    <marker id="ar3" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#22c55e"/></marker>
    <marker id="ar4" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#ef4444"/></marker>
  </defs>
</svg>