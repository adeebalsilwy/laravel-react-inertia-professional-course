<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#f0fdf4" rx="20"/>
  
  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="20" fill="#064e3b">تشبيه "الحارس وقفل الشقة" للـ Policies</text>
  
  <!-- Building -->
  <g transform="translate(30, 60)">
    <rect width="180" height="180" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect x="10" y="10" width="160" height="30" rx="5" fill="#d1fae5"/>
    <text x="90" y="30" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="12" fill="#065f46">العمارة (التطبيق)</text>
    <text x="90" y="70" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#047857">المصادقة: دخول العمارة</text>
    <text x="90" y="100" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#047857">(تسجيل الدخول)</text>
    <rect x="30" y="120" width="120" height="3" fill="#10b981"/>
    <rect x="30" y="140" width="120" height="3" fill="#10b981"/>
    <rect x="30" y="160" width="120" height="3" fill="#10b981"/>
  </g>
  
  <!-- Lock icon for apartment -->
  <g transform="translate(290, 60)">
    <rect width="220" height="180" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="12" fill="#065f46">شقة سارة (مشروع سارة)</text>
    <rect x="35" y="50" width="150" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="110" y="80" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="12" fill="#92400e">🔒 قفل الشقة</text>
    <text x="110" y="105" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#b45309">Policy: يمنع أحمد من الدخول</text>
    <text x="110" y="130" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#b45309">لأن user_id لا يطابق</text>
  </g>
  
  <!-- Ahmed trying -->
  <g transform="translate(580, 60)">
    <rect width="190" height="140" rx="8" fill="white" stroke="#ef4444" stroke-width="2"/>
    <circle cx="95" cy="40" r="18" fill="#fee2e2"/>
    <text x="95" y="80" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#991b1b">أحمد</text>
    <text x="95" y="105" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#b91c1c">"سأحاول فتح شقة</text>
    <text x="95" y="120" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#b91c1c">سارة!"</text>
  </g>
  
  <path d="M 210 150 L 280 150" stroke="#10b981" stroke-width="2" stroke-dasharray="5 5"/>
  <path d="M 510 150 L 570 150" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#ar_lock)"/>
  
  <defs>
    <marker id="ar_lock" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#ef4444"/></marker>
  </defs>
</svg>