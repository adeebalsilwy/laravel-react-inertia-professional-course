<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#fdf2f8" rx="20"/>
  
  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="20" fill="#831843">تشبيه "بطاقة الهوية الذكية" للملف الشخصي</text>
  
  <!-- Card -->
  <g transform="translate(40, 60)">
    <rect width="220" height="180" rx="14" fill="white" stroke="#f472b6" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="40" rx="14" fill="#f472b6"/>
    <rect x="0" y="20" width="220" height="20" fill="#f472b6"/>
    <text x="110" y="28" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="14" fill="white">بطاقة الهوية الذكية</text>
    
    <!-- Photo placeholder -->
    <rect x="15" y="55" width="50" height="50" rx="25" fill="#fce7f3" stroke="#f472b6" stroke-width="1"/>
    <text x="40" y="85" text-anchor="middle" font-size="18">👤</text>
    
    <text x="80" y="72" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="12" fill="#831843">الاسم: أحمد</text>
    <text x="80" y="92" font-family="Tajawal, Arial, sans-serif" font-size="11" fill="#9d174d">البريد: a@b.com</text>
    
    <text x="110" y="125" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9d174d">[عرض البيانات]</text>
    <line x1="20" y1="135" x2="200" y2="135" stroke="#fce7f3" stroke-width="1"/>
    
    <text x="110" y="155" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9d174d">[تعديل الاسم والبريد]</text>
    <line x1="20" y1="160" x2="200" y2="160" stroke="#fce7f3" stroke-width="1"/>
    
    <text x="110" y="175" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9d174d">[تغيير كلمة المرور]</text>
  </g>
  
  <!-- Flow arrows -->
  <path d="M 260 150 L 310 150" stroke="#f472b6" stroke-width="3" marker-end="url(#ar_card)"/>
  
  <!-- Actions panel -->
  <g transform="translate(320, 60)">
    <rect width="220" height="180" rx="14" fill="white" stroke="#f472b6" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#831843">مكتب الأحوال</text>
    <text x="110" y="55" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9d174d">(ProfileController)</text>
    
    <rect x="20" y="70" width="180" height="25" rx="5" fill="#fdf2f8" stroke="#f472b6" stroke-width="1"/>
    <text x="110" y="87" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9d174d">1. استقبال الطلب</text>
    
    <rect x="20" y="100" width="180" height="25" rx="5" fill="#fdf2f8" stroke="#f472b6" stroke-width="1"/>
    <text x="110" y="117" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9d174d">2. التحقق من البيانات</text>
    
    <rect x="20" y="130" width="180" height="25" rx="5" fill="#fdf2f8" stroke="#f472b6" stroke-width="1"/>
    <text x="110" y="147" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9d174d">3. تحديث السجل</text>
    
    <rect x="20" y="160" width="180" height="25" rx="5" fill="#fdf2f8" stroke="#f472b6" stroke-width="1"/>
    <text x="110" y="177" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9d174d">4. إيصال: "تم التحديث"</text>
  </g>
  
  <path d="M 540 150 L 590 150" stroke="#22c55e" stroke-width="3" marker-end="url(#ar_card_green)"/>
  
  <!-- Success message -->
  <g transform="translate(600, 60)">
    <rect width="170" height="100" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="85" y="45" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#15803d">✅ إيصال التحديث</text>
    <text x="85" y="70" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#166534">"تم تحديث بياناتك</text>
    <text x="85" y="85" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#166534">بنحاح"</text>
    <text x="85" y="100" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="8" fill="#166534">(يظهر مرة واحدة)</text>
  </g>
  
  <defs>
    <marker id="ar_card" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#f472b6"/></marker>
    <marker id="ar_card_green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#22c55e"/></marker>
  </defs>
</svg>