<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#f5f3ff" rx="20"/>
  
  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="20" fill="#4c1d95">تشبيه "المطار" للـ Middleware</text>
  
  <!-- Checkpoint 1 -->
  <g transform="translate(20, 60)">
    <rect width="180" height="180" rx="10" fill="white" stroke="#8b5cf6" stroke-width="2"/>
    <text x="90" y="30" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#5b21b6">🛂 نقطة 1: جواز السفر</text>
    <text x="90" y="60" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">Middleware 'auth'</text>
    <text x="90" y="85" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">يسأل: "هل لديك</text>
    <text x="90" y="100" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">تذكرة صالحة؟"</text>
    <text x="90" y="125" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">(هل أنت مسجل دخول؟)</text>
    <rect x="20" y="145" width="140" height="4" rx="2" fill="#a78bfa"/>
    <rect x="20" y="155" width="140" height="4" rx="2" fill="#a78bfa"/>
    <rect x="20" y="165" width="140" height="4" rx="2" fill="#a78bfa"/>
  </g>
  
  <path d="M 200 150 L 230 150" stroke="#8b5cf6" stroke-width="2" marker-end="url(#ar_air)"/>
  
  <!-- Checkpoint 2 -->
  <g transform="translate(240, 60)">
    <rect width="180" height="180" rx="10" fill="white" stroke="#8b5cf6" stroke-width="2"/>
    <text x="90" y="30" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#5b21b6">🛄 نقطة 2: التأشيرة</text>
    <text x="90" y="60" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">Middleware 'check.project'</text>
    <text x="90" y="85" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">يسأل: "هل لديك</text>
    <text x="90" y="100" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">تأشيرة دخول</text>
    <text x="90" y="115" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">لهذا البلد؟"</text>
    <text x="90" y="140" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">(هل تملك صلاحية</text>
    <text x="90" y="155" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">لهذا المشروع؟)</text>
  </g>
  
  <path d="M 420 150 L 450 150" stroke="#8b5cf6" stroke-width="2" marker-end="url(#ar_air)"/>
  
  <!-- Checkpoint 3 + Plane -->
  <g transform="translate(460, 60)">
    <rect width="180" height="180" rx="10" fill="white" stroke="#8b5cf6" stroke-width="2"/>
    <text x="90" y="30" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#5b21b6">✈️ نقطة 3: الصعود</text>
    <text x="90" y="60" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">Middleware 'verified'</text>
    <text x="90" y="85" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">يسأل: "هل صورتك</text>
    <text x="90" y="100" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">تطابق الجواز؟"</text>
    <text x="90" y="125" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">(هل حسابك موثق؟)</text>
    <path d="M 30 160 L 150 160" stroke="#8b5cf6" stroke-width="2"/>
    <polygon points="70,155 70,165 80,160" fill="#8b5cf6"/>
    <text x="90" y="175" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="9" fill="#7c3aed">🚀 Controller = الطائرة!</text>
  </g>
  
  <defs>
    <marker id="ar_air" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8b5cf6"/></marker>
  </defs>
</svg>