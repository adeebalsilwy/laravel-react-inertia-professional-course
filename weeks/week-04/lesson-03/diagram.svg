<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f5f3ff" rx="20"/>
  
  <text x="400" y="40" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="22" fill="#4c1d95">تدفق الـ Middleware في Laravel</text>
  
  <!-- Browser -->
  <rect x="20" y="100" width="120" height="70" rx="12" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="80" y="140" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#5b21b6">🌐 المتصفح</text>
  <text x="80" y="158" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">يرسل طلب HTTP</text>
  
  <path d="M 140 135 L 180 135" stroke="#8b5cf6" stroke-width="2" marker-end="url(#ar_mid)"/>
  
  <!-- Middleware Chain -->
  <rect x="190" y="60" width="120" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="250" y="90" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="11" fill="#5b21b6">1. 'auth'</text>
  
  <rect x="190" y="120" width="120" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="250" y="150" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="11" fill="#5b21b6">2. 'verified'</text>
  
  <rect x="190" y="180" width="120" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="250" y="210" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="11" fill="#5b21b6">3. 'check.project'</text>
  
  <text x="250" y="260" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="11" fill="#8b5cf6">سلسلة Middleware</text>
  
  <path d="M 310 135 L 360 135" stroke="#8b5cf6" stroke-width="2" marker-end="url(#ar_mid)"/>
  
  <!-- Controller -->
  <rect x="370" y="100" width="150" height="70" rx="12" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="445" y="135" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#5b21b6">🎯 Controller</text>
  <text x="445" y="155" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">ينفذ العملية</text>
  
  <path d="M 520 135 L 570 135" stroke="#8b5cf6" stroke-width="2" marker-end="url(#ar_mid)"/>
  
  <!-- Response -->
  <rect x="580" y="100" width="120" height="70" rx="12" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="640" y="135" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#5b21b6">📨 الرد (Response)</text>
  <text x="640" y="155" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#7c3aed">صفحة HTML/JSON</text>
  
  <!-- Failure path -->
  <path d="M 250 170 L 250 320 L 640 320 L 640 170" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 5" fill="none" marker-end="url(#ar_fail)"/>
  <text x="440" y="340" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="12" fill="#dc2626">إذا فشل الفحص → رد مباشر (403, redirect, إلخ)</text>
  
  <defs>
    <marker id="ar_mid" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8b5cf6"/></marker>
    <marker id="ar_fail" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#ef4444"/></marker>
  </defs>
</svg>