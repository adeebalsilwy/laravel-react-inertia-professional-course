<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>كويز الدرس 13: احتراف المصادقة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-['Tajawal',sans-serif]">

<header class="glass sticky top-0 z-50 border-b border-slate-200/70">
    <div class="mx-auto max-w-7xl px-4 py-3 flex items-center justify-between gap-4">
        <a href="../../../index.html" class="font-black text-2xl text-slate-900 tracking-tight">FlowPilot <span class="text-indigo-600">Academy</span></a>
    </div>
</header>

<main class="mx-auto max-w-3xl px-4 py-12 text-right">
    <a class="font-black text-indigo-700 hover:underline inline-block mb-8" href="index.html">← العودة للدرس</a>
    
    <div class="space-y-12">
        <div class="text-center space-y-4">
            <h1 class="text-3xl font-black text-indigo-600">كويز الدرس 13: المصادقة</h1>
            <p class="text-slate-600 italic">"افهم كيف يحمي Laravel بيانات فريقك."</p>
        </div>

        <div id="quiz-container" class="space-y-8">
            <!-- MCQ 1 -->
            <div class="card p-8 space-y-6 shadow-sm bg-white rounded-3xl" data-answer="c">
                <p class="font-black text-xl leading-relaxed">1. ما الفرق الأساسي بين Authentication و Authorization؟</p>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-300 cursor-pointer">
                        <input type="radio" name="q1" value="a" class="hidden">
                        <span>أ) لا يوجد فرق، كلاهما نفس الشيء.</span>
                    </label>
                    <label class="flex items-center gap-3 p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-300 cursor-pointer">
                        <input type="radio" name="q1" value="b" class="hidden">
                        <span>ب) الأول لتصميم الألوان والثاني لقاعدة البيانات.</span>
                    </label>
                    <label class="flex items-center gap-3 p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-300 cursor-pointer">
                        <input type="radio" name="q1" value="c" class="hidden">
                        <span>ج) الأول للتحقق من الهوية، والثاني للتحقق من الصلاحيات.</span>
                    </label>
                </div>
            </div>

            <!-- MCQ 2 -->
            <div class="card p-8 space-y-6 shadow-sm bg-white rounded-3xl" data-answer="b">
                <p class="font-black text-xl leading-relaxed">2. لماذا نستخدم Laravel Breeze في FlowPilot؟</p>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-300 cursor-pointer">
                        <input type="radio" name="q2" value="a" class="hidden">
                        <span>أ) لتسريع سرعة الإنترنت في الموقع.</span>
                    </label>
                    <label class="flex items-center gap-3 p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-300 cursor-pointer">
                        <input type="radio" name="q2" value="b" class="hidden">
                        <span>ب) لتوفير نظام دخول وتسجيل جاهز ومؤمن.</span>
                    </label>
                    <label class="flex items-center gap-3 p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-300 cursor-pointer">
                        <input type="radio" name="q2" value="c" class="hidden">
                        <span>ج) لإضافة صور للمشاريع.</span>
                    </label>
                </div>
            </div>

            <!-- Final Button -->
            <div class="card p-10 text-center space-y-6 bg-slate-900 text-white rounded-[2rem]">
                <p class="font-black text-2xl">درجتك النهائية</p>
                <div id="quizResult" class="text-5xl font-black text-indigo-400">-- / 2</div>
                <button data-grade-quiz class="px-10 py-4 bg-indigo-600 rounded-2xl font-black hover:bg-indigo-700 transition-all">صحح كويزي الآن</button>
            </div>
        </div>
    </div>
</main>

<script src="../../../assets/js/app.js"></script>
</body>
</html>
