<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#fffbeb" rx="20"/>
  
  <!-- Auth flow -->
  <rect x="50" y="100" width="180" height="120" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="140" y="150" text-anchor="middle" font-weight="bold">المستخدم</text>
  <text x="140" y="175" text-anchor="middle" font-size="12">إدخال البيانات</text>
  
  <rect x="310" y="100" width="180" height="120" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="150" text-anchor="middle" font-weight="bold" fill="#92400e">Laravel Auth</text>
  <text x="400" y="175" text-anchor="middle" font-size="12" fill="#b45309">التحقق من الصحة</text>
  
  <rect x="570" y="100" width="180" height="120" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="150" text-anchor="middle" font-weight="bold" fill="#92400e">Session / Cookie</text>
  <text x="660" y="175" text-anchor="middle" font-size="12" fill="#b45309">إصدار بطاقة الدخول</text>
  
  <path d="M 230 160 L 300 160" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr3)"/>
  <path d="M 490 160 L 560 160" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr3)"/>
  
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#f59e0b" /></marker>
  </defs>
  
  <text x="400" y="40" text-anchor="middle" font-weight="bold" font-size="22" fill="#78350f">دورة حياة المصادقة (Authentication)</text>
</svg>