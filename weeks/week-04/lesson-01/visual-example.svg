<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#fff7ed" rx="20"/>
  
  <!-- Hotel Analogy -->
  <g transform="translate(100, 80)">
    <rect width="180" height="140" rx="10" fill="white" stroke="#ea580c" stroke-width="2"/>
    <text x="90" y="40" text-anchor="middle" font-weight="bold">موظف الاستقبال</text>
    <text x="90" y="70" text-anchor="middle" font-size="12" fill="#9a3412">التحقق من الهوية</text>
  </g>
  
  <g transform="translate(520, 80)">
    <rect width="180" height="140" rx="10" fill="white" stroke="#ea580c" stroke-width="2"/>
    <rect x="60" y="50" width="60" height="40" rx="5" fill="#fdba74"/>
    <text x="90" y="110" text-anchor="middle" font-weight="bold">بطاقة الغرفة</text>
    <text x="90" y="130" text-anchor="middle" font-size="12" fill="#9a3412">تسجيل الدخول</text>
  </g>
  
  <path d="M 280 150 L 510 150" stroke="#ea580c" stroke-width="4" stroke-dasharray="8 4"/>
  
  <text x="400" y="40" text-anchor="middle" font-weight="bold" font-size="22" fill="#7c2d12">تشبيه "الفندق" لنظام الدخول</text>
</svg>