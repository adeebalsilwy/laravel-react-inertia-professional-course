<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#fff7ed" rx="20"/>
  
  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="20" fill="#7c2d12">تشبيه "الفندق" لنظام المصادقة</text>
  
  <!-- Guest arrives -->
  <g transform="translate(40, 60)">
    <rect width="140" height="120" rx="10" fill="white" stroke="#ea580c" stroke-width="2"/>
    <circle cx="70" cy="40" r="20" fill="#fed7aa"/>
    <text x="70" y="80" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#9a3412">الزائر</text>
    <text x="70" y="100" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9a3412">(مستخدم غير مسجل)</text>
  </g>
  
  <path d="M 180 120 L 230 120" stroke="#ea580c" stroke-width="3" marker-end="url(#arr_hotel)"/>
  
  <!-- Reception desk -->
  <g transform="translate(240, 50)">
    <rect width="180" height="140" rx="10" fill="white" stroke="#ea580c" stroke-width="2"/>
    <rect x="10" y="10" width="160" height="35" rx="5" fill="#fdba74"/>
    <text x="90" y="33" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="13" fill="#7c2d12">موظف الاستقبال</text>
    <text x="90" y="70" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9a3412">يسأل: "ما اسمك؟"</text>
    <text x="90" y="90" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9a3412">(البريد الإلكتروني)</text>
    <text x="90" y="110" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9a3412">"ما رقم حجزك؟"</text>
    <text x="90" y="128" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9a3412">(كلمة المرور)</text>
  </g>
  
  <path d="M 420 120 L 470 120" stroke="#ea580c" stroke-width="3" marker-end="url(#arr_hotel)"/>
  
  <!-- Key card -->
  <g transform="translate(480, 60)">
    <rect width="160" height="130" rx="10" fill="white" stroke="#ea580c" stroke-width="2"/>
    <rect x="30" y="30" width="100" height="60" rx="5" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
    <text x="80" y="55" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="11" fill="#7c2d12">بطاقة الغرفة</text>
    <text x="80" y="75" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="9" fill="#9a3412">(Session)</text>
    <text x="80" y="110" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#9a3412">يفتح باب الغرفة فقط</text>
  </g>
  
  <path d="M 560 190 L 560 250 L 140 250 L 140 180" stroke="#ea580c" stroke-width="2" stroke-dasharray="5 5" fill="none" marker-end="url(#arr_hotel)"/>
  <text x="350" y="270" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="12" fill="#9a3412">يستخدم البطاقة طوال فترة الإقامة (Session مستمرة)</text>
  
  <defs>
    <marker id="arr_hotel" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/></marker>
  </defs>
</svg>