<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc" rx="20"/>
  
  <!-- Server -->
  <rect x="50" y="100" width="300" height="200" rx="10" fill="#fff" stroke="#4f46e5" stroke-width="2"/>
  <text x="200" y="130" text-anchor="middle" font-weight="bold">الخادم (Server)</text>
  <rect x="70" y="150" width="260" height="130" rx="5" fill="#f5f3ff"/>
  <text x="200" y="180" text-anchor="middle" font-size="12" fill="#4338ca">Laravel Application</text>
  
  <!-- The World -->
  <rect x="450" y="100" width="300" height="200" rx="10" fill="#fff" stroke="#10b981" stroke-width="2"/>
  <text x="600" y="130" text-anchor="middle" font-weight="bold">الإنترنت (The Web)</text>
  <circle cx="600" cy="200" r="40" fill="#d1fae5"/>
  <text x="600" y="205" text-anchor="middle" font-size="12" fill="#065f46">المستخدمون</text>
  
  <!-- The Link -->
  <path d="M 350 200 L 450 200" stroke="#4f46e5" stroke-width="4" stroke-dasharray="10 5" marker-end="url(#arr-deploy)"/>
  
  <defs>
    <marker id="arr-deploy" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#4f46e5" /></marker>
  </defs>
  
  <text x="400" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#0f172a">مخطط نشر التطبيق (Deployment)</text>
</svg>