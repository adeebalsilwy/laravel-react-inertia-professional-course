<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc" rx="20"/>
  <text x="400" y="45" text-anchor="middle" font-family="Tajawal, Tahoma" font-weight="bold" font-size="22" fill="#0f172a">مقارنة: بيئة التطوير vs بيئة الإنتاج</text>
  
  <!-- Dev Side -->
  <rect x="30" y="70" width="350" height="300" rx="15" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="30" y="70" width="350" height="45" rx="15" fill="#f59e0b"/>
  <text x="205" y="100" text-anchor="middle" font-family="Tajawal, Tahoma" font-weight="bold" fill="#fff" font-size="18">🔧 بيئة التطوير (Development)</text>
  
  <text x="205" y="145" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="13" fill="#64748b">npm run dev → آلاف الملفات الصغيرة</text>
  <text x="205" y="175" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="13" fill="#64748b">APP_DEBUG=true → أخطاء مفصلة تظهر</text>
  <text x="205" y="205" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="13" fill="#64748b">لا يوجد تخزين مؤقت (Cache)</text>
  <text x="205" y="235" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="13" fill="#64748b">سرعة تحميل بطيئة (100+ ملف)</text>
  <text x="205" y="265" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="13" fill="#64748b">مناسب للتعديل والتجريب</text>
  
  <rect x="70" y="290" width="270" height="55" rx="10" fill="#fef3c7"/>
  <text x="205" y="315" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="12" fill="#92400e">الاستخدام: فقط على جهازك المحلي</text>
  <text x="205" y="335" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="12" fill="#92400e">🚫 غير مناسب للجمهور</text>

  <!-- Prod Side -->
  <rect x="420" y="70" width="350" height="300" rx="15" fill="#fff" stroke="#22c55e" stroke-width="2"/>
  <rect x="420" y="70" width="350" height="45" rx="15" fill="#22c55e"/>
  <text x="595" y="100" text-anchor="middle" font-family="Tajawal, Tahoma" font-weight="bold" fill="#fff" font-size="18">🚀 بيئة الإنتاج (Production)</text>
  
  <text x="595" y="145" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="13" fill="#64748b">npm run build → 2-3 ملفات مضغوطة</text>
  <text x="595" y="175" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="13" fill="#64748b">APP_DEBUG=false → أخطاء مخفية</text>
  <text x="595" y="205" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="13" fill="#64748b">config:cache + route:cache → سريع</text>
  <text x="595" y="235" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="13" fill="#64748b">سرعة تحميل عالية (ملف واحد)</text>
  <text x="595" y="265" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="13" fill="#64748b">آمن ومستقر ومحسّن</text>
  
  <rect x="460" y="290" width="270" height="55" rx="10" fill="#dcfce7"/>
  <text x="595" y="315" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="12" fill="#166534">الاستخدام: على السيرفر العام</text>
  <text x="595" y="335" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="12" fill="#166534">✅ جاهز لآلاف المستخدمين</text>

  <!-- Arrow -->
  <path d="M 380 220 L 415 220" stroke="#6366f1" stroke-width="3" marker-end="url(#arr)" stroke-dasharray="8 4"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6366f1"/></marker>
  </defs>
  <text x="400" y="210" text-anchor="middle" font-family="Tajawal, Tahoma" font-size="11" fill="#6366f1" font-weight="bold">التحضير</text>
</svg>