<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#f8fafc" rx="20"/>
  
  <!-- Browser -->
  <rect x="40" y="100" width="180" height="120" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="130" y="150" text-anchor="middle" font-weight="bold">المتصفح</text>
  <text x="130" y="175" text-anchor="middle" font-size="12">طلب /dashboard</text>
  
  <!-- Laravel Route -->
  <rect x="310" y="100" width="180" height="120" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="150" text-anchor="middle" font-weight="bold" fill="#991b1b">Laravel Route</text>
  <text x="400" y="175" text-anchor="middle" font-size="12" fill="#b91c1c">توجيه الطلب</text>
  
  <!-- React Page -->
  <rect x="580" y="100" width="180" height="120" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="670" y="150" text-anchor="middle" font-weight="bold" fill="#075985">React Page</text>
  <text x="670" y="175" text-anchor="middle" font-size="12" fill="#0369a1">عرض الواجهة</text>
  
  <path d="M 220 160 L 300 160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 490 160 L 570 160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" /></marker>
  </defs>
  
  <text x="400" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#0f172a">دورة حياة طلب المسار (Routing)</text>
</svg>