<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#f0f9ff" rx="20"/>
  
  <!-- Mall Analogy -->
  <g transform="translate(50, 80)">
    <rect width="200" height="140" rx="10" fill="white" stroke="#0ea5e9" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" font-weight="bold">اللوحات الإرشادية</text>
    <text x="100" y="70" text-anchor="middle" font-size="12" fill="#0369a1">الـ Route</text>
  </g>
  
  <g transform="translate(300, 80)">
    <rect width="200" height="140" rx="10" fill="white" stroke="#0ea5e9" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" font-weight="bold">موظف الاستقبال</text>
    <text x="100" y="70" text-anchor="middle" font-size="12" fill="#0369a1">الـ Controller</text>
  </g>
  
  <g transform="translate(550, 80)">
    <rect width="200" height="140" rx="10" fill="white" stroke="#0ea5e9" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" font-weight="bold">الأقسام والسلع</text>
    <text x="100" y="70" text-anchor="middle" font-size="12" fill="#0369a1">البيانات (Data)</text>
  </g>
  
  <path d="M 250 150 L 290 150" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arr2)"/>
  <path d="M 500 150 L 540 150" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arr2)"/>
  
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#0ea5e9" /></marker>
  </defs>
  
  <text x="400" y="40" text-anchor="middle" font-weight="bold" font-size="22" fill="#0c4a6e">تشبيه "المجمع التجاري" للمسارات</text>
</svg>