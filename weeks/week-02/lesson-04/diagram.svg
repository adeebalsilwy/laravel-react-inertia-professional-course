<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgL4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecfdf5;stop-opacity:1" />
    </linearGradient>
    <filter id="sh4" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgL4)" rx="24"/>
  <text x="400" y="40" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="22" fill="#0f172a">📊 هيكل Dashboard FlowPilot وتدفق البيانات</text>
  <text x="400" y="62" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="13" fill="#64748b">من Laravel Controller إلى React - رحلة بيانات Dashboard</text>

  <!-- Laravel Side -->
  <rect x="20" y="80" width="240" height="300" rx="16" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="140" y="108" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="15" fill="#991b1b">🔴 خادم Laravel</text>

  <!-- Step 1: Route -->
  <g filter="url(#sh4)">
    <rect x="35" y="125" width="210" height="45" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="140" y="153" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="700" font-size="13" fill="#991b1b">1️⃣ Route::get('/dashboard')</text>
  </g>

  <!-- Step 2: Controller -->
  <g filter="url(#sh4)">
    <rect x="35" y="185" width="210" height="55" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="140" y="208" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="700" font-size="13" fill="#92400e">2️⃣ DashboardController</text>
    <text x="140" y="228" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#b45309">يجمع stats + recentProjects</text>
  </g>

  <!-- Step 3: Shared Data -->
  <g filter="url(#sh4)">
    <rect x="35" y="255" width="210" height="45" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="140" y="283" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="700" font-size="13" fill="#075985">3️⃣ HandleInertiaRequests</text>
  </g>

  <!-- Step 4: Inertia Render -->
  <g filter="url(#sh4)">
    <rect x="35" y="315" width="210" height="45" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
    <text x="140" y="343" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="700" font-size="13" fill="#065f46">4️⃣ Inertia::render()</text>
  </g>

  <!-- Connection arrows between steps -->
  <line x1="140" y1="170" x2="140" y2="182" stroke="#64748b" stroke-width="2" marker-end="url(#arrL4)"/>
  <line x1="140" y1="240" x2="140" y2="252" stroke="#64748b" stroke-width="2" marker-end="url(#arrL4)"/>
  <line x1="140" y1="300" x2="140" y2="312" stroke="#64748b" stroke-width="2" marker-end="url(#arrL4)"/>
  <defs><marker id="arrL4" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/></marker></defs>

  <!-- Arrow from Laravel to React -->
  <path d="M260 200 L310 200" stroke="#10b981" stroke-width="3" marker-end="url(#arrL4g)"/>
  <defs><marker id="arrL4g" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#10b981"/></marker></defs>
  <text x="285" y="193" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#10b981" font-weight="700">بيانات + Shared</text>

  <!-- React Side -->
  <rect x="320" y="80" width="460" height="300" rx="16" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="550" y="108" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="15" fill="#075985">🔵 واجهة React</text>

  <!-- Dashboard Page -->
  <g filter="url(#sh4)">
    <rect x="340" y="125" width="420" height="50" rx="12" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
    <text x="550" y="150" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="14" fill="#4338ca">📄 Dashboard.jsx (مع Layout)</text>
    <text x="550" y="166" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#6366f1">تستقبل Props: stats, recentProjects | Shared: auth, appName</text>
  </g>

  <!-- Stat Cards Row -->
  <g filter="url(#sh4)">
    <text x="550" y="205" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="700" font-size="12" fill="#64748b">grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4</text>
    
    <rect x="345" y="215" width="95" height="60" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="392" y="238" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="18">📁</text>
    <text x="392" y="258" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#4338ca" font-weight="700">12 مشروع</text>

    <rect x="450" y="215" width="95" height="60" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="497" y="238" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="18">✅</text>
    <text x="497" y="258" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#065f46" font-weight="700">45 مهمة</text>

    <rect x="555" y="215" width="95" height="60" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="602" y="238" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="18">👥</text>
    <text x="602" y="258" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#92400e" font-weight="700">8 أعضاء</text>

    <rect x="660" y="215" width="95" height="60" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="707" y="238" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="18">⏳</text>
    <text x="707" y="258" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#991b1b" font-weight="700">7 معلقة</text>
  </g>

  <!-- Recent Projects -->
  <g filter="url(#sh4)">
    <rect x="340" y="290" width="420" height="75" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="550" y="312" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="700" font-size="13" fill="#0f172a">📋 آخر المشاريع (recentProjects.map)</text>
    
    <rect x="355" y="325" width="125" height="30" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="417" y="345" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#64748b">موقع الشركة</text>
    
    <rect x="490" y="325" width="125" height="30" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="552" y="345" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#64748b">تطبيق الجوال</text>
    
    <rect x="625" y="325" width="125" height="30" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="687" y="345" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#64748b">لوحة التحكم</text>
  </g>

  <!-- Welcome message -->
  <text x="550" y="125" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#6366f1" font-weight="700">👋 أهلاً بك يا {auth.user.name}</text>
</svg>
