<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bgL4v" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="sh4v" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="800" height="300" fill="url(#bgL4v)" rx="20"/>
  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="20" fill="#0f172a">🚗 تشبيه "عدادات السيارة" للـ Dashboard</text>
  <text x="400" y="55" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="12" fill="#64748b">لوحة العدادات في السيارة = لوحة التحكم في FlowPilot</text>

  <!-- Car dashboard -->
  <g filter="url(#sh4v)">
    <rect x="50" y="75" width="700" height="200" rx="24" fill="#1e293b" stroke="#334155" stroke-width="3"/>
    
    <!-- Speedometer -->
    <circle cx="200" cy="185" r="75" fill="#0f172a" stroke="#3b82f6" stroke-width="4"/>
    <path d="M145 220 A 70 70 0 0 1 255 220" fill="none" stroke="#3b82f6" stroke-width="6"/>
    <line x1="200" y1="185" x2="170" y2="145" stroke="#ef4444" stroke-width="3"/>
    <circle cx="200" cy="185" r="6" fill="#3b82f6"/>
    <text x="200" y="130" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="28" fill="#ffffff">120</text>
    <text x="200" y="148" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#94a3b8">السرعة (كم/س)</text>
    <text x="200" y="280" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#3b82f6" font-weight="700">🏎️ عداد السرعة</text>
    <text x="200" y="295" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="9" fill="#64748b">= عدد المشاريع النشطة</text>

    <!-- Fuel Gauge -->
    <rect x="330" y="110" width="40" height="80" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="3"/>
    <rect x="330" y="140" width="40" height="50" rx="4" fill="#22c55e"/>
    <text x="350" y="95" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="22" fill="#22c55e">¾</text>
    <text x="350" y="265" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#22c55e" font-weight="700">⛽ مؤشر الوقود</text>
    <text x="350" y="280" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="9" fill="#64748b">= نسبة إنجاز المهام</text>

    <!-- Temperature -->
    <rect x="440" y="110" width="40" height="80" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="3"/>
    <rect x="440" y="160" width="40" height="30" rx="4" fill="#ef4444"/>
    <text x="460" y="95" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="22" fill="#ef4444">H</text>
    <text x="460" y="265" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#ef4444" font-weight="700">🌡️ حرارة المحرك</text>
    <text x="460" y="280" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="9" fill="#64748b">= المهام المتأخرة</text>

    <!-- Odometer -->
    <g>
      <rect x="540" y="115" width="180" height="60" rx="12" fill="#0f172a" stroke="#f59e0b" stroke-width="3"/>
      <text x="630" y="140" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="26" fill="#f59e0b">45,231</text>
      <text x="630" y="160" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#f59e0b">كم</text>
      <text x="630" y="265" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#f59e0b" font-weight="700">📟 عداد المسافة</text>
      <text x="630" y="280" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="9" fill="#64748b">= إجمالي الأنشطة</text>
    </g>

    <!-- Steering wheel -->
    <circle cx="400" cy="225" r="20" fill="none" stroke="#475569" stroke-width="3"/>
    <line x1="400" y1="205" x2="400" y2="195" stroke="#475569" stroke-width="3"/>
    <line x1="385" y1="220" x2="375" y2="218" stroke="#475569" stroke-width="3"/>
    <line x1="415" y1="220" x2="425" y2="218" stroke="#475569" stroke-width="3"/>
  </g>

  <!-- Connection labels at bottom -->
  <g transform="translate(50, 285)">
    <text x="0" y="10" font-family="Tajawal, Tahoma, sans-serif" font-size="9" fill="#64748b">عدادات السيارة</text>
    <text x="70" y="10" font-family="Tajawal, Tahoma, sans-serif" font-size="9" fill="#64748b">←→</text>
    <text x="100" y="10" font-family="Tajawal, Tahoma, sans-serif" font-size="9" fill="#64748b">بطاقات StatCard في Dashboard FlowPilot</text>
  </g>
</svg>
