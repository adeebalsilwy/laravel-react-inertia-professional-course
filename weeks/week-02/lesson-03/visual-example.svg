<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bgL3v" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:1" />
    </linearGradient>
    <filter id="sh3v" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="300" fill="url(#bgL3v)" rx="20"/>
  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="20" fill="#0f172a">🧱 تشبيه "قطع الليغو (Lego)" للمكونات</text>
  <text x="400" y="55" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="12" fill="#64748b">كل قطعة = Component. القطع الصغيرة تتجمع لتبني أشياء كبيرة.</text>

  <!-- House built of Lego blocks -->
  <g filter="url(#sh3v)">
    <!-- Base plate -->
    <rect x="120" y="200" width="250" height="20" rx="4" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
    
    <!-- Lego block 1 - Door -->
    <rect x="130" y="150" width="50" height="50" rx="6" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="170" cy="175" r="4" fill="#ffffff"/>
    <text x="155" y="178" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="8" fill="#ffffff" font-weight="700">باب</text>
    
    <!-- Lego block 2 - Window 1 -->
    <rect x="200" y="150" width="50" height="40" rx="6" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="225" y1="150" x2="225" y2="190" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="200" y1="170" x2="250" y2="170" stroke="#2563eb" stroke-width="1.5"/>
    <text x="225" y="142" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="8" fill="#2563eb" font-weight="700">نافذة</text>

    <!-- Lego block 3 - Window 2 -->
    <rect x="265" y="150" width="50" height="40" rx="6" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="290" y1="150" x2="290" y2="190" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="265" y1="170" x2="315" y2="170" stroke="#2563eb" stroke-width="1.5"/>
    <text x="290" y="142" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="8" fill="#2563eb" font-weight="700">نافذة</text>

    <!-- Lego block 4 - Roof -->
    <rect x="120" y="110" width="250" height="35" rx="6" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
    <text x="245" y="133" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#ffffff" font-weight="900">🏠 السقف</text>

    <!-- Lego block 5 - Chimney -->
    <rect x="300" y="70" width="30" height="40" rx="4" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
    <text x="315" y="62" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="8" fill="#d97706" font-weight="700">مدخنة</text>
  </g>

  <!-- Arrow and text: These all assemble -->
  <path d="M380 165 L430 165" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrL3)"/>
  <defs><marker id="arrL3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/></marker></defs>

  <!-- Final assembled house (React Component Tree) -->
  <g filter="url(#sh3v)">
    <rect x="440" y="80" width="320" height="170" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="600" y="110" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="16" fill="#92400e">= 🏗️ المكونات في React</text>
    
    <rect x="460" y="125" width="140" height="30" rx="8" fill="#6366f1"/>
    <text x="530" y="145" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#ffffff" font-weight="700">AppLayout.jsx</text>
    
    <rect x="620" y="125" width="120" height="30" rx="8" fill="#8b5cf6"/>
    <text x="680" y="145" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#ffffff" font-weight="700">Dashboard.jsx</text>

    <rect x="460" y="170" width="90" height="28" rx="8" fill="#c4b5fd"/>
    <text x="505" y="189" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#4c1d95" font-weight="700">Navbar</text>
    
    <rect x="560" y="170" width="90" height="28" rx="8" fill="#c4b5fd"/>
    <text x="605" y="189" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#4c1d95" font-weight="700">Sidebar</text>

    <rect x="660" y="170" width="90" height="28" rx="8" fill="#c4b5fd"/>
    <text x="705" y="189" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#4c1d95" font-weight="700">StatCard</text>

    <rect x="480" y="210" width="100" height="28" rx="8" fill="#ddd6fe"/>
    <text x="530" y="229" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#4c1d95" font-weight="700">ProjectCard</text>
    
    <rect x="600" y="210" width="100" height="28" rx="8" fill="#ddd6fe"/>
    <text x="650" y="229" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#4c1d95" font-weight="700">StatusBadge</text>
  </g>

  <!-- Labels -->
  <text x="245" y="255" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#64748b">قطع الليغو (كل قطعة = Component)</text>
  <text x="600" y="270" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#64748b">المكونات في React (تركيب المكونات)</text>
</svg>
