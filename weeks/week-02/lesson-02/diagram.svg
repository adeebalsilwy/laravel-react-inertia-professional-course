<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgL2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef2ff;stop-opacity:1" />
    </linearGradient>
    <filter id="sh2" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgL2)" rx="24"/>
  <text x="400" y="40" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="22" fill="#0f172a">هيكل الـ Layout في تطبيق FlowPilot</text>
  <text x="400" y="62" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="13" fill="#64748b">Navbar ثابت في الأعلى - Sidebar على اليمين - محتوى متغير في الوسط</text>

  <!-- Navbar -->
  <g filter="url(#sh2)">
    <rect x="200" y="80" width="580" height="55" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="200" y="80" width="580" height="12" rx="12" fill="#6366f1"/>
    <text x="220" y="115" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="16" fill="#0f172a">🔷 FlowPilot</text>
    <rect x="700" y="95" width="30" height="30" rx="15" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="715" y="115" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="12" fill="#6366f1">👤</text>
    <!-- Hamburger -->
    <rect x="745" y="95" width="24" height="24" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="757" y="112" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="14" fill="#64748b">☰</text>
    <text x="400" y="118" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#94a3b8">شريط التنقل العلوي (Navbar) - يظهر في كل الصفحات</text>
  </g>

  <!-- Sidebar -->
  <g filter="url(#sh2)">
    <rect x="20" y="80" width="170" height="270" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="20" y="80" width="170" height="50" rx="16" fill="#6366f1"/>
    <rect x="20" y="114" width="170" height="16" fill="#6366f1"/>
    <text x="105" y="112" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="14" fill="#ffffff">القائمة</text>
    
    <!-- Nav items -->
    <rect x="30" y="145" width="150" height="36" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
    <text x="48" y="168" font-family="Tajawal, Tahoma, sans-serif" font-size="13" fill="#6366f1" font-weight="700">🏠 Dashboard</text>
    
    <rect x="30" y="188" width="150" height="36" rx="10" fill="#f8fafc" stroke="none"/>
    <text x="48" y="211" font-family="Tajawal, Tahoma, sans-serif" font-size="13" fill="#64748b" font-weight="500">📁 المشاريع</text>
    
    <rect x="30" y="231" width="150" height="36" rx="10" fill="#f8fafc" stroke="none"/>
    <text x="48" y="254" font-family="Tajawal, Tahoma, sans-serif" font-size="13" fill="#64748b" font-weight="500">✅ المهام</text>
    
    <rect x="30" y="274" width="150" height="36" rx="10" fill="#f8fafc" stroke="none"/>
    <text x="48" y="297" font-family="Tajawal, Tahoma, sans-serif" font-size="13" fill="#64748b" font-weight="500">👥 الفريق</text>
    
    <rect x="30" y="317" width="150" height="36" rx="10" fill="#f8fafc" stroke="none"/>
    <text x="48" y="340" font-family="Tajawal, Tahoma, sans-serif" font-size="13" fill="#64748b" font-weight="500">⚙️ الإعدادات</text>
  </g>

  <!-- Main Content Area -->
  <g filter="url(#sh2)">
    <rect x="200" y="145" width="580" height="145" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="490" y="200" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="18" fill="#94a3b8">📄 محتوى الصفحة (يتغير)</text>
    <text x="490" y="230" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="13" fill="#94a3b8">هذه المنطقة تحتوي على {children}</text>
    <text x="490" y="255" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="12" fill="#cbd5e1">كل صفحة تمرر محتواها الخاص إلى هنا</text>
  </g>

  <!-- Footer -->
  <g filter="url(#sh2)">
    <rect x="200" y="300" width="580" height="50" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="490" y="330" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="12" fill="#94a3b8">© 2026 FlowPilot. كل الحقوق محفوظة. | التذييل الثابت (Footer)</text>
  </g>

  <!-- Labels -->
  <text x="105" y="380" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#6366f1" font-weight="700">➡️ العرض: 256px</text>
  <text x="400" y="380" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#64748b">⬅️ المساحة المتبقية للمحتوى (flex-1)</text>
</svg>
