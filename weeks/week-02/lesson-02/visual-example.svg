<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bgL2v" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf2f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fce7f3;stop-opacity:1" />
    </linearGradient>
    <filter id="sh2v" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="300" fill="url(#bgL2v)" rx="20"/>
  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="20" fill="#0f172a">🖼️ تشبيه "إطار الصور" للـ Layout</text>
  <text x="400" y="55" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="12" fill="#64748b">الإطار ثابت - الصورة تتغير - تماماً مثل Layout والمحتوى</text>

  <!-- Frame outer -->
  <g filter="url(#sh2v)">
    <rect x="120" y="75" width="560" height="200" rx="20" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
    <!-- Inner frame border -->
    <rect x="135" y="90" width="530" height="170" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <!-- Title bar of frame -->
    <rect x="135" y="90" width="530" height="40" rx="14" fill="#f59e0b"/>
    <rect x="135" y="116" width="530" height="14" fill="#f59e0b"/>
    <text x="400" y="117" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="16" fill="#ffffff">إطار الصورة (Layout)</text>
    
    <!-- Changing "pictures" -->
    <text x="400" y="160" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="28">🖼️</text>
    <text x="400" y="195" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="700" font-size="16" fill="#92400e">محتوى الصفحة (يتغير)</text>
    <text x="400" y="220" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#b45309">اليوم: 🏠 Dashboard | غداً: 📁 المشاريع | بعد غد: ✅ المهام</text>
    <text x="400" y="242" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#d97706">الإطار (Layout) يظل كما هو - فقط الصورة (المحتوى) تتغير</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="100" cy="175" r="45" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="100" y="172" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="14" fill="#be185d">={children}</text>
  <text x="100" y="192" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#be185d">Prop</text>
  
  <circle cx="700" cy="175" r="45" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="700" y="172" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-weight="900" font-size="14" fill="#be185d">&lt;Page&gt;</text>
  <text x="700" y="192" text-anchor="middle" font-family="Tajawal, Tahoma, sans-serif" font-size="10" fill="#be185d">Component</text>

  <!-- Dashed connection -->
  <path d="M145 175 L100 175" stroke="#ec4899" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrL2)"/>
  <path d="M655 175 L700 175" stroke="#ec4899" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrL2)"/>
  <defs>
    <marker id="arrL2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ec4899"/>
    </marker>
  </defs>
  
  <!-- Bottom explanation -->
  <g transform="translate(210, 265)">
    <rect x="0" y="0" width="16" height="16" rx="4" fill="#f59e0b"/>
    <text x="20" y="13" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#64748b">الإطار (Layout) ثابت</text>
    <rect x="150" y="0" width="16" height="16" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="170" y="13" font-family="Tajawal, Tahoma, sans-serif" font-size="11" fill="#64748b">الصورة ({children}) تتغير</text>
  </g>
</svg>
