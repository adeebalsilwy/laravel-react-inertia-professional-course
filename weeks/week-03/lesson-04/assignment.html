<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>واجب الدرس 12: استعلامات احترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-['Tajawal',sans-serif]">
<main class="mx-auto max-w-3xl px-4 py-12">
    <div class="card p-12 space-y-8">
        <h1 class="text-3xl font-black text-center text-indigo-600">واجب الأداء العالي</h1>
        <div class="space-y-6 text-right">
            <h3 class="font-black text-xl">تحدي المبرمج:</h3>
            <p class="text-slate-600 leading-relaxed italic">"تطبيقك بدأ يكبر، يجب أن تحميه من البطء."</p>
            <ol class="list-decimal pr-6 space-y-4 font-bold text-slate-700">
                <li>اكتب استعلاماً يجلب المستخدمين الذين سجلوا في آخر 7 أيام فقط.</li>
                <li>استخدم <code>withCount('tasks')</code> لجلب المشاريع مع عدد المهام الموجودة في كل مشروع.</li>
                <li>اشرح لزميلك: متى نستخدم <code>get()</code> ومتى نستخدم <code>first()</code>؟</li>
            </ol>
        </div>
    </div>
</main>
</body>
</html>
