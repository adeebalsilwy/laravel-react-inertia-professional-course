<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0fdf4" rx="20"/>
  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" font-size="22" fill="#0f172a">مقارنة الأداء: قبل تحسين الاستعلامات وبعدها</text>
  <text x="400" y="55" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#64748b" font-size="13">سيناريو: 100 مشروع، كل مشروع له مستخدم ومهام</text>

  <!-- BEFORE section -->
  <rect x="30" y="75" width="360" height="200" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <rect x="30" y="75" width="360" height="40" rx="12" fill="#ef4444"/>
  <rect x="30" y="100" width="360" height="15" fill="#ef4444"/>
  <text x="210" y="100" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" fill="#fff" font-size="16">🔴 قبل التحسين (Lazy Loading)</text>
  
  <text x="210" y="140" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="bold" fill="#991b1b" font-size="18">1 + (100 × 2) = 201 استعلام</text>
  
  <!-- Query count visual -->
  <rect x="50" y="160" width="320" height="30" rx="6" fill="#fecaca"/>
  <text x="210" y="180" text-anchor="middle" font-family="monospace" fill="#991b1b" font-size="11">1 استعلام: SELECT * FROM projects</text>
  
  <rect x="50" y="195" width="320" height="30" rx="6" fill="#fecaca"/>
  <text x="210" y="215" text-anchor="middle" font-family="monospace" fill="#991b1b" font-size="11">100 استعلام: SELECT * FROM users WHERE id = ? (لكل مشروع)</text>
  
  <rect x="50" y="230" width="320" height="30" rx="6" fill="#fecaca"/>
  <text x="210" y="250" text-anchor="middle" font-family="monospace" fill="#991b1b" font-size="11">100 استعلام: SELECT * FROM tasks WHERE project_id = ? (لكل مشروع)</text>

  <!-- Arrow down -->
  <path d="M 400 175 L 430 175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker></defs>

  <!-- AFTER section -->
  <rect x="440" y="75" width="340" height="200" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <rect x="440" y="75" width="340" height="40" rx="12" fill="#10b981"/>
  <rect x="440" y="100" width="340" height="15" fill="#10b981"/>
  <text x="610" y="100" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" fill="#fff" font-size="16">🟢 بعد التحسين (Eager Loading)</text>
  
  <text x="610" y="140" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="bold" fill="#065f46" font-size="18">فقط 3 استعلامات!</text>

  <rect x="460" y="160" width="300" height="25" rx="6" fill="#a7f3d0"/>
  <text x="610" y="178" text-anchor="middle" font-family="monospace" fill="#065f46" font-size="11">1: SELECT id, name FROM projects</text>
  
  <rect x="460" y="190" width="300" height="25" rx="6" fill="#a7f3d0"/>
  <text x="610" y="208" text-anchor="middle" font-family="monospace" fill="#065f46" font-size="11">2: SELECT id, name FROM users WHERE id IN (...)</text>
  
  <rect x="460" y="220" width="300" height="25" rx="6" fill="#a7f3d0"/>
  <text x="610" y="238" text-anchor="middle" font-family="monospace" fill="#065f46" font-size="11">3: SELECT * FROM tasks WHERE project_id IN (...)</text>

  <rect x="460" y="255" width="300" height="15" rx="4" fill="#34d399"/>
  <text x="610" y="266" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#fff" font-weight="bold" font-size="10">67× أسرع! ⚡</text>

  <!-- Other optimization techniques -->
  <rect x="30" y="290" width="750" height="95" rx="10" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="315" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" fill="#4338ca" font-size="14">🛠️ تقنيات التحسين الأخرى في هذا الدرس</text>
  
  <rect x="50" y="330" width="170" height="40" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="135" y="350" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#4338ca" font-size="11" font-weight="bold">Query Scopes</text>
  <text x="135" y="363" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#6366f1" font-size="9">إعادة استخدام الشروط</text>

  <rect x="240" y="330" width="170" height="40" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="325" y="350" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#4338ca" font-size="11" font-weight="bold">::when()</text>
  <text x="325" y="363" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#6366f1" font-size="9">استعلام شرطي</text>

  <rect x="430" y="330" width="170" height="40" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="515" y="350" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#4338ca" font-size="11" font-weight="bold">Chunking</text>
  <text x="515" y="363" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#6366f1" font-size="9">تقسيم النتائج</text>

  <rect x="620" y="330" width="140" height="40" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="690" y="350" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#4338ca" font-size="11" font-weight="bold">Caching</text>
  <text x="690" y="363" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#6366f1" font-size="9">حفظ النتائج</text>
</svg>
