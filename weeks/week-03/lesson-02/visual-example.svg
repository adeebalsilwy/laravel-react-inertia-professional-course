<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#f0fdf4" rx="20"/>
  <text x="400" y="30" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" font-size="20" fill="#065f46">تشبيه "بناء منزل" لـ Migrations و Seeders</text>

  <!-- House blueprint = Migration -->
  <rect x="30" y="55" width="220" height="220" rx="10" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <text x="140" y="80" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="800" fill="#4338ca" font-size="14">🏗️ المخطط الهندسي</text>
  <text x="140" y="100" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#6366f1" font-size="11">(Migration)</text>
  <line x1="50" y1="115" x2="230" y2="115" stroke="#e2e8f0"/>
  <text x="140" y="138" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#334155" font-size="11">يحدد: غرفة نوم (جدول)</text>
  <text x="140" y="158" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#334155" font-size="11">حمام (عمود)</text>
  <text x="140" y="178" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#334155" font-size="11">نوافذ (خصائص)</text>
  <text x="140" y="198" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#64748b" font-size="10">up() = بناء</text>
  <text x="140" y="215" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#64748b" font-size="10">down() = هدم</text>

  <!-- Arrow -->
  <path d="M 255 170 L 290 170" stroke="#64748b" stroke-width="2.5" marker-end="url(#b)" fill="none"/>
  <defs><marker id="b" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker></defs>

  <!-- Actual House = Database -->
  <rect x="300" y="55" width="200" height="220" rx="10" fill="#fff" stroke="#10b981" stroke-width="2"/>
  <rect x="340" y="70" width="120" height="80" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <polygon points="360,70 400,45 440,70" fill="#10b981"/>
  <text x="400" y="130" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="800" fill="#065f46" font-size="14">🏠 المنزل الفعلي</text>
  <text x="400" y="148" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#10b981" font-size="11">(قاعدة البيانات)</text>
  <line x1="315" y1="165" x2="485" y2="165" stroke="#e2e8f0"/>
  <text x="400" y="188" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#334155" font-size="11">الجدران = الجداول</text>
  <text x="400" y="208" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#334155" font-size="11">الغرف = الأعمدة</text>
  <text x="400" y="228" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#334155" font-size="11">الأبواب = العلاقات</text>

  <!-- Arrow -->
  <path d="M 505 170 L 540 170" stroke="#64748b" stroke-width="2.5" marker-end="url(#b)" fill="none"/>

  <!-- Furniture = Seeder/Factory -->
  <rect x="550" y="55" width="220" height="220" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="80" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="800" fill="#92400e" font-size="14">🛋️ الأثاث واللمسات</text>
  <text x="660" y="100" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#f59e0b" font-size="11">(Seeder + Factory)</text>
  <line x1="565" y1="115" x2="755" y2="115" stroke="#e2e8f0"/>
  <text x="660" y="138" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#334155" font-size="11">يضع: الأثاث (البيانات)</text>
  <text x="660" y="158" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#334155" font-size="11">الستائر (القيم الافتراضية)</text>
  <text x="660" y="178" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#334155" font-size="11">الناس (المستخدمين)</text>
  <text x="660" y="198" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#64748b" font-size="10">Seeder = يدوي (قطعة قطعة)</text>
  <text x="660" y="215" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#64748b" font-size="10">Factory = مصنع (automated)</text>

  <!-- Bottom tagline -->
  <rect x="30" y="275" width="740" height="20" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="289" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#64748b" font-size="10">
    بدون Migration = بناء بدون مخطط | بدون Seeder = منزل بدون أثاث | بدون Factory = صنع كل قطعة يدوياً
  </text>
</svg>
