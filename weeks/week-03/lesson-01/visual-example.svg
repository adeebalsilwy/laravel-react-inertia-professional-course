<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#f0f9ff" rx="20"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" font-size="20" fill="#0369a1">تشبيه "خزانة الأرشيف" لفهم قاعدة البيانات</text>

  <!-- Cabinet (Database) -->
  <rect x="20" y="60" width="140" height="200" rx="10" fill="#94a3b8" stroke="#475569" stroke-width="3"/>
  <rect x="35" y="70" width="110" height="180" rx="6" fill="#e2e8f0"/>
  <text x="90" y="250" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="700" font-size="12" fill="#475569">الخزانة</text>
  <text x="90" y="265" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="10" fill="#64748b">قاعدة البيانات</text>

  <!-- Drawer (Table) -->
  <rect x="55" y="85" width="70" height="40" rx="4" fill="#f8fafc" stroke="#10b981" stroke-width="2"/>
  <circle cx="75" cy="105" r="8" fill="#10b981"/>
  <text x="90" y="109" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="8" fill="#fff" font-weight="700">م</text>
  <text x="90" y="140" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="10" fill="#10b981" font-weight="700">درج "المشاريع"</text>
  <text x="90" y="153" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="8" fill="#64748b">الجدول (Table)</text>

  <!-- Files (Rows) in Drawer -->
  <rect x="60" y="160" width="60" height="15" rx="2" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="90" y="171" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="7" fill="#334155">تطبيق الموقع</text>
  <rect x="60" y="178" width="60" height="15" rx="2" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="90" y="189" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="7" fill="#334155">تطبيق المتجر</text>
  <rect x="60" y="196" width="60" height="15" rx="2" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="90" y="207" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="7" fill="#334155">لوحة القيادة</text>

  <!-- Arrow to next section -->
  <path d="M 165 155 L 195 155" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrowBlue)" fill="none"/>
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- File Details (Single Row) -->
  <rect x="200" y="70" width="170" height="190" rx="10" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="200" y="70" width="170" height="30" rx="10" fill="#0ea5e9"/>
  <rect x="200" y="88" width="170" height="12" fill="#0ea5e9"/>
  <text x="285" y="90" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="800" fill="#fff" font-size="12">ملف: مشروع #1</text>
  <text x="285" y="108" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="8" fill="#f0f9ff">السجل (Row)</text>
  
  <line x1="210" y1="115" x2="360" y2="115" stroke="#e2e8f0"/>
  <text x="215" y="132" font-family="monospace" font-size="9" fill="#334155">PK  id: 1</text>
  <text x="215" y="150" font-family="monospace" font-size="9" fill="#334155">    name: تطبيق الموقع</text>
  <text x="215" y="168" font-family="monospace" font-size="9" fill="#334155">    status: active</text>
  <text x="215" y="186" font-family="monospace" font-size="9" fill="#334155">    created: 2025-06-01</text>
  <text x="215" y="204" font-family="monospace" font-size="9" fill="#059669">FK  user_id: 7</text>
  
  <rect x="215" y="215" width="140" height="35" rx="6" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="285" y="230" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="8" fill="#0369a1" font-weight="700">user_id = 7 يشير إلى</text>
  <text x="285" y="243" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="8" fill="#0369a1">المستخدم رقم 7 في جدول Users</text>

  <!-- Arrow to FK reference -->
  <path d="M 370 170 L 410 170" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowGreen)" fill="none"/>
  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Users Table Reference -->
  <rect x="415" y="80" width="170" height="170" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <rect x="415" y="80" width="170" height="30" rx="10" fill="#059669"/>
  <rect x="415" y="98" width="170" height="12" fill="#059669"/>
  <text x="500" y="100" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="800" fill="#fff" font-size="12">جدول Users</text>
  
  <line x1="425" y1="115" x2="575" y2="115" stroke="#e2e8f0"/>
  <text x="430" y="135" font-family="monospace" font-size="9" fill="#334155">PK  id: 7  ←</text>
  <text x="430" y="153" font-family="monospace" font-size="9" fill="#334155">    name: أحمد علي</text>
  <text x="430" y="171" font-family="monospace" font-size="9" fill="#334155">    email: ahmed@...</text>
  
  <rect x="430" y="190" width="140" height="45" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="500" y="207" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="8" fill="#065f46" font-weight="700">🔗 هنا تم الربط!</text>
  <text x="500" y="222" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="8" fill="#065f46">user_id = 7 في المشروع</text>
  <text x="500" y="232" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="8" fill="#065f46">يشير إلى id=7 في Users</text>

  <!-- Bottom explanation -->
  <rect x="20" y="270" width="760" height="22" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="285" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="10" fill="#64748b">
    الخزانة (قاعدة البيانات) → الأدراج (الجداول) → الملفات (السجلات) → الأرقام المرجعية (المفاتيح الأجنبية للربط)
  </text>
</svg>
