<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#ecfdf5" rx="20"/>
  
  <!-- Archive Analogy -->
  <g transform="translate(100, 80)">
    <rect width="150" height="140" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect x="20" y="20" width="110" height="10" rx="2" fill="#d1fae5"/>
    <rect x="20" y="40" width="110" height="10" rx="2" fill="#d1fae5"/>
    <text x="75" y="100" text-anchor="middle" font-weight="bold">درج الملفات</text>
    <text x="75" y="120" text-anchor="middle" font-size="12" fill="#065f46">الجدول (Table)</text>
  </g>
  
  <g transform="translate(325, 80)">
    <rect width="150" height="140" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
    <path d="M 40 40 L 110 100" stroke="#10b981" stroke-width="2"/>
    <text x="75" y="120" text-anchor="middle" font-weight="bold">الأوراق الملونة</text>
    <text x="75" y="135" text-anchor="middle" font-size="10" fill="#065f46">العلاقات (Relations)</text>
  </g>
  
  <g transform="translate(550, 80)">
    <rect width="150" height="140" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
    <circle cx="75" cy="50" r="20" fill="#10b981" fill-opacity="0.2"/>
    <text x="75" y="100" text-anchor="middle" font-weight="bold">الملف الواحد</text>
    <text x="75" y="120" text-anchor="middle" font-size="12" fill="#065f46">السجل (Row)</text>
  </g>
  
  <text x="400" y="40" text-anchor="middle" font-weight="bold" font-size="22" fill="#064e3b">تشبيه "الأرشيف" لقاعدة البيانات</text>
</svg>