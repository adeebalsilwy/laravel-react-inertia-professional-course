<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>واجب الدرس 9: تصميم جداول FlowPilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-['Tajawal',sans-serif]">
<main class="mx-auto max-w-3xl px-4 py-12">
    <div class="card p-12 space-y-8">
        <h1 class="text-3xl font-black text-center text-indigo-600">تحدي التصميم المعماري</h1>
        <div class="space-y-6 text-right">
            <h3 class="font-black text-xl">المطلوب منك:</h3>
            <p class="text-slate-600 leading-relaxed">ارسم على ورقة أو باستخدام أداة رسم (مثل Lucidchart) الجداول الثلاثة (Users, Projects, Tasks). حدد في كل جدول 4 أعمدة على الأقل (مثلاً: id, name, created_at...).</p>
            <p class="text-slate-600"><strong>تحدي:</strong> كيف تربط المهمة بالمشروع؟ (ابحث عن معنى Foreign Key).</p>
        </div>
    </div>
</main>
</body>
</html>
