<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowMany" viewBox="0 0 12 10" refX="12" refY="5" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M 0 0 L 8 5 L 0 10 M 8 0 L 12 5 L 8 10" fill="#64748b"/>
    </marker>
  </defs>
  
  <rect width="800" height="400" fill="#f8fafc" rx="20"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" font-size="22" fill="#0f172a">مخطط هيكل قاعدة بيانات FlowPilot</text>
  <text x="400" y="55" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#64748b" font-size="13">كل جدول يمثل كياناً (Entity) والخطوط تمثل العلاقات</text>

  <!-- Users Table -->
  <rect x="30" y="80" width="160" height="145" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="30" y="80" width="160" height="35" rx="8" fill="#6366f1"/>
  <rect x="30" y="98" width="160" height="17" fill="#6366f1"/>
  <text x="110" y="103" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="800" fill="#fff" font-size="14">Users</text>
  <line x1="40" y1="120" x2="180" y2="120" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="140" font-family="monospace" font-size="11" fill="#334155">PK  id (bigIncrements)</text>
  <text x="45" y="158" font-family="monospace" font-size="11" fill="#334155">    name (string)</text>
  <text x="45" y="176" font-family="monospace" font-size="11" fill="#334155">    email (string)</text>
  <text x="45" y="194" font-family="monospace" font-size="11" fill="#334155">    password (string)</text>
  <text x="45" y="212" font-family="monospace" font-size="11" fill="#94a3b8">    timestamps</text>

  <!-- Projects Table -->
  <rect x="320" y="80" width="160" height="160" rx="8" fill="#fff" stroke="#10b981" stroke-width="2.5"/>
  <rect x="320" y="80" width="160" height="35" rx="8" fill="#10b981"/>
  <rect x="320" y="98" width="160" height="17" fill="#10b981"/>
  <text x="400" y="103" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="800" fill="#fff" font-size="14">Projects</text>
  <line x1="330" y1="120" x2="470" y2="120" stroke="#e2e8f0" stroke-width="1"/>
  <text x="335" y="140" font-family="monospace" font-size="11" fill="#334155">PK  id (bigIncrements)</text>
  <text x="335" y="158" font-family="monospace" font-size="11" fill="#059669">FK  user_id</text>
  <text x="335" y="176" font-family="monospace" font-size="11" fill="#334155">    name (string)</text>
  <text x="335" y="194" font-family="monospace" font-size="11" fill="#334155">    status (enum)</text>
  <text x="335" y="212" font-family="monospace" font-size="11" fill="#334155">    deadline (date)</text>
  <text x="335" y="230" font-family="monospace" font-size="11" fill="#94a3b8">    timestamps</text>

  <!-- Tasks Table -->
  <rect x="610" y="80" width="160" height="160" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
  <rect x="610" y="80" width="160" height="35" rx="8" fill="#f59e0b"/>
  <rect x="610" y="98" width="160" height="17" fill="#f59e0b"/>
  <text x="690" y="103" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="800" fill="#fff" font-size="14">Tasks</text>
  <line x1="620" y1="120" x2="760" y2="120" stroke="#e2e8f0" stroke-width="1"/>
  <text x="625" y="140" font-family="monospace" font-size="11" fill="#334155">PK  id (bigIncrements)</text>
  <text x="625" y="158" font-family="monospace" font-size="11" fill="#d97706">FK  project_id</text>
  <text x="625" y="176" font-family="monospace" font-size="11" fill="#d97706">FK  assigned_to</text>
  <text x="625" y="194" font-family="monospace" font-size="11" fill="#334155">    title (string)</text>
  <text x="625" y="212" font-family="monospace" font-size="11" fill="#334155">    status (enum)</text>
  <text x="625" y="230" font-family="monospace" font-size="11" fill="#94a3b8">    timestamps</text>

  <!-- Pivot: project_user -->
  <rect x="250" y="280" width="300" height="90" rx="8" fill="#fdf4ff" stroke="#d946ef" stroke-width="2" stroke-dasharray="6 3"/>
  <rect x="250" y="280" width="300" height="30" rx="8" fill="#d946ef"/>
  <rect x="250" y="298" width="300" height="12" fill="#d946ef"/>
  <text x="400" y="300" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="800" fill="#fff" font-size="13">project_user (Pivot Table)</text>
  <text x="270" y="335" font-family="monospace" font-size="11" fill="#334155">PK  id | FK  project_id | FK  user_id | role | joined_at</text>
  <text x="400" y="358" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#a21caf" font-size="10" font-weight="700">لعلاقة Many-to-Many بين المشاريع والمستخدمين</text>

  <!-- Relationships -->
  <!-- Users → Projects (1:M) -->
  <path d="M 190 160 L 310 160" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowMany)" fill="none"/>
  <text x="250" y="150" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="10" fill="#64748b" font-weight="700">يملك</text>
  
  <!-- Projects → Tasks (1:M) -->
  <path d="M 480 160 L 600 160" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowMany)" fill="none"/>
  <text x="540" y="150" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="10" fill="#64748b" font-weight="700">يحتوي</text>

  <!-- Projects → project_user (1:M) -->
  <path d="M 400 240 L 400 275" stroke="#a21caf" stroke-width="2" marker-end="url(#arrowMany)" fill="none" stroke-dasharray="4 2"/>
  
  <!-- project_user → Users (M:1) -->
  <path d="M 270 280 L 100 250" stroke="#a21caf" stroke-width="2" marker-end="url(#arrowMany)" fill="none" stroke-dasharray="4 2"/>

  <!-- Legend -->
  <rect x="30" y="330" width="180" height="55" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="120" y="348" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="11" font-weight="700" fill="#334155">وسيلة الإيضاح</text>
  <rect x="40" y="355" width="12" height="12" rx="2" fill="#6366f1"/>
  <text x="58" y="366" font-family="Tajawal, sans-serif" font-size="10" fill="#475569">PK = Primary Key</text>
  <rect x="40" y="370" width="12" height="12" rx="2" fill="#059669"/>
  <text x="58" y="381" font-family="Tajawal, sans-serif" font-size="10" fill="#475569">FK = Foreign Key</text>
</svg>
