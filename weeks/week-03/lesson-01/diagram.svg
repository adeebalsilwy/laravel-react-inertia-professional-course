<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc" rx="20"/>
  
  <!-- Tables -->
  <rect x="50" y="100" width="180" height="150" rx="10" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <text x="140" y="130" text-anchor="middle" font-weight="bold" fill="#4338ca">Users</text>
  <line x1="60" y1="140" x2="220" y2="140" stroke="#e2e8f0"/>
  <text x="70" y="165" font-size="12">id</text>
  <text x="70" y="190" font-size="12">name</text>
  <text x="70" y="215" font-size="12">email</text>
  
  <rect x="310" y="100" width="180" height="150" rx="10" fill="#fff" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" font-weight="bold" fill="#065f46">Projects</text>
  <line x1="320" y1="140" x2="480" y2="140" stroke="#e2e8f0"/>
  <text x="330" y="165" font-size="12">id</text>
  <text x="330" y="190" font-size="12">user_id (FK)</text>
  <text x="330" y="215" font-size="12">name</text>
  
  <rect x="570" y="100" width="180" height="150" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="130" text-anchor="middle" font-weight="bold" fill="#92400e">Tasks</text>
  <line x1="580" y1="140" x2="740" y2="140" stroke="#e2e8f0"/>
  <text x="590" y="165" font-size="12">id</text>
  <text x="590" y="190" font-size="12">project_id (FK)</text>
  <text x="590" y="215" font-size="12">title</text>
  
  <!-- Relations -->
  <path d="M 230 180 L 310 180" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 5"/>
  <path d="M 490 180 L 570 180" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 5"/>
  
  <text x="400" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#0f172a">تصميم قاعدة بيانات FlowPilot</text>
  <text x="400" y="320" text-anchor="middle" fill="#64748b" font-size="14">المستخدم يملك مشاريع، والمشروع يحتوي على مهام</text>
</svg>