<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#faf5ff" rx="20"/>
  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" font-size="22" fill="#0f172a">مخطط علاقات Eloquent Models في FlowPilot</text>
  <text x="400" y="55" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#64748b" font-size="13">كل خط يمثل علاقة Eloquent (hasMany, belongsTo, belongsToMany)</text>

  <!-- User Model -->
  <rect x="20" y="90" width="220" height="145" rx="12" fill="#fff" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="20" y="90" width="220" height="40" rx="12" fill="#6366f1"/>
  <rect x="20" y="115" width="220" height="15" fill="#6366f1"/>
  <text x="130" y="115" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" fill="#fff" font-size="15">User Model</text>
  <text x="130" y="135" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#c7d2fe" font-size="10">app/Models/User.php</text>
  <line x1="30" y1="150" x2="230" y2="150" stroke="#e2e8f0"/>
  <text x="35" y="168" font-family="monospace" font-size="11" fill="#334155">+ ownedProjects(): hasMany</text>
  <text x="35" y="186" font-family="monospace" font-size="11" fill="#334155">+ memberOfProjects(): belongsToMany</text>
  <text x="35" y="204" font-family="monospace" font-size="11" fill="#334155">+ assignedTasks(): hasMany</text>
  <text x="35" y="222" font-family="monospace" font-size="11" fill="#94a3b8">--- id, name, email, password ---</text>

  <!-- Project Model -->
  <rect x="300" y="80" width="220" height="170" rx="12" fill="#fff" stroke="#10b981" stroke-width="2.5"/>
  <rect x="300" y="80" width="220" height="40" rx="12" fill="#10b981"/>
  <rect x="300" y="105" width="220" height="15" fill="#10b981"/>
  <text x="410" y="105" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" fill="#fff" font-size="15">Project Model</text>
  <text x="410" y="125" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#a7f3d0" font-size="10">app/Models/Project.php</text>
  <line x1="310" y1="140" x2="510" y2="140" stroke="#e2e8f0"/>
  <text x="315" y="158" font-family="monospace" font-size="11" fill="#334155">+ user(): belongsTo</text>
  <text x="315" y="176" font-family="monospace" font-size="11" fill="#334155">+ tasks(): hasMany</text>
  <text x="315" y="194" font-family="monospace" font-size="11" fill="#334155">+ members(): belongsToMany</text>
  <text x="315" y="212" font-family="monospace" font-size="11" fill="#94a3b8">--- id, user_id, name, status ---</text>
  <text x="315" y="228" font-family="monospace" font-size="11" fill="#94a3b8">--- description, deadline ---</text>
  <text x="315" y="244" font-family="monospace" font-size="10" fill="#059669">$fillable + Accessor status</text>

  <!-- Task Model -->
  <rect x="580" y="90" width="200" height="145" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
  <rect x="580" y="90" width="200" height="40" rx="12" fill="#f59e0b"/>
  <rect x="580" y="115" width="200" height="15" fill="#f59e0b"/>
  <text x="680" y="115" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" fill="#fff" font-size="15">Task Model</text>
  <text x="680" y="135" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#fde68a" font-size="10">app/Models/Task.php</text>
  <line x1="590" y1="150" x2="770" y2="150" stroke="#e2e8f0"/>
  <text x="595" y="168" font-family="monospace" font-size="11" fill="#334155">+ project(): belongsTo</text>
  <text x="595" y="186" font-family="monospace" font-size="11" fill="#334155">+ assignee(): belongsTo</text>
  <text x="595" y="204" font-family="monospace" font-size="11" fill="#94a3b8">--- id, project_id, title, status ---</text>
  <text x="595" y="222" font-family="monospace" font-size="11" fill="#94a3b8">--- assigned_to, priority, due_date ---</text>

  <!-- Lines showing relationships -->
  <!-- User → Project (1:M) -->
  <path d="M 240 160 L 295 160" stroke="#6366f1" stroke-width="3" marker-end="url(#arrowM)" fill="none"/>
  <text x="268" y="153" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="9" fill="#4338ca" font-weight="bold">1 : M</text>

  <!-- Project → Task (1:M) -->
  <path d="M 520 160 L 575 160" stroke="#10b981" stroke-width="3" marker-end="url(#arrowM)" fill="none"/>
  <text x="548" y="153" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="9" fill="#065f46" font-weight="bold">1 : M</text>

  <!-- User → Task (1:M assigned) -->
  <path d="M 220 220 L 250 250 L 590 230" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowM)" fill="none"/>
  <text x="400" y="245" text-anchor="middle" font-family="Tajawal, sans-serif" font-size="9" fill="#92400e" font-weight="bold">1 : M (assignee)</text>

  <!-- Project ↔ User (M:N via pivot) -->
  <rect x="300" y="295" width="220" height="50" rx="8" fill="#fdf4ff" stroke="#d946ef" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="410" y="315" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="700" fill="#a21caf" font-size="12">🔗 project_user (Pivot)</text>
  <text x="410" y="335" text-anchor="middle" font-family="monospace" fill="#a21caf" font-size="9">+pivot: role, joined_at</text>

  <path d="M 410 250 L 410 290" stroke="#d946ef" stroke-width="2" marker-end="url(#arrowM)" fill="none" stroke-dasharray="4 2"/>
  <path d="M 130 235 L 130 270 L 300 320" stroke="#d946ef" stroke-width="2" marker-end="url(#arrowM)" fill="none" stroke-dasharray="4 2"/>

  <text x="400" y="370" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#475569" font-size="11">
    🟢 arrows = hasMany (يملك عدة)  |  🔵 ينتهي عند = belongsTo (ينتمي لـ)  |  🟣 منقط = belongsToMany (Pivot)
  </text>

  <defs>
    <marker id="arrowM" viewBox="0 0 12 10" refX="12" refY="5" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M 0 0 L 8 5 L 0 10 M 8 0 L 12 5 L 8 10" fill="#64748b"/>
    </marker>
  </defs>
</svg>
