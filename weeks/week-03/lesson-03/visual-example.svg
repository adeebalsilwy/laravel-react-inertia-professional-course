<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#fefce8" rx="20"/>
  <text x="400" y="30" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" font-size="20" fill="#713f12">تشبيه "المترجم البشري" لـ Eloquent ORM</text>

  <!-- Developer speaking PHP -->
  <rect x="20" y="60" width="200" height="200" rx="12" fill="#fff" stroke="#6366f1" stroke-width="2"/>
  <text x="120" y="90" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="800" fill="#4338ca" font-size="14">👨‍💻 المطور (PHP)</text>
  <text x="120" y="110" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#6366f1" font-size="11">يتحدث PHP</text>
  <line x1="35" y1="125" x2="205" y2="125" stroke="#e2e8f0"/>
  <text x="120" y="148" text-anchor="middle" font-family="monospace" fill="#334155" font-size="11">$user->projects</text>
  <text x="120" y="168" text-anchor="middle" font-family="monospace" fill="#334155" font-size="11">$project->tasks</text>
  <text x="120" y="188" text-anchor="middle" font-family="monospace" fill="#334155" font-size="11">Project::find(1)</text>
  <text x="120" y="208" text-anchor="middle" font-family="monospace" fill="#334155" font-size="11">Project::where()</text>
  <text x="120" y="228" text-anchor="middle" font-family="monospace" fill="#334155" font-size="11">$task->project->name</text>

  <!-- Arrow -->
  <path d="M 225 160 L 265 160" stroke="#f59e0b" stroke-width="3" marker-end="url(#translator)" fill="none"/>
  <defs><marker id="translator" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#f59e0b"/></marker></defs>

  <!-- Eloquent ORM as translator -->
  <rect x="275" y="60" width="250" height="200" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="8 4"/>
  <text x="400" y="95" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" fill="#92400e" font-size="16">🔄 Eloquent ORM</text>
  <text x="400" y="118" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#f59e0b" font-size="12">"المترجم البشري"</text>
  <line x1="290" y1="133" x2="510" y2="133" stroke="#e2e8f0"/>
  <text x="400" y="155" text-anchor="middle" font-family="monospace" fill="#92400e" font-size="11">يترجم: PHP → SQL</text>
  <text x="400" y="175" text-anchor="middle" font-family="monospace" fill="#92400e" font-size="11">$user->projects</text>
  <text x="400" y="190" text-anchor="middle" font-family="monospace" fill="#92400e" font-size="11">↓</text>
  <text x="400" y="208" text-anchor="middle" font-family="monospace" fill="#92400e" font-size="11">SELECT * FROM projects</text>
  <text x="400" y="228" text-anchor="middle" font-family="monospace" fill="#92400e" font-size="11">WHERE user_id = ?</text>

  <!-- Arrow -->
  <path d="M 530 160 L 570 160" stroke="#10b981" stroke-width="3" marker-end="url(#db)" fill="none"/>
  <defs><marker id="db" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#10b981"/></marker></defs>

  <!-- MySQL Database -->
  <rect x="580" y="60" width="200" height="200" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <ellipse cx="680" cy="85" rx="70" ry="15" fill="#10b981" opacity="0.15"/>
  <text x="680" y="100" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="900" fill="#065f46" font-size="16">🗄️ MySQL</text>
  <text x="680" y="120" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#10b981" font-size="11">قاعدة البيانات</text>
  <line x1="595" y1="135" x2="765" y2="135" stroke="#e2e8f0"/>
  <text x="680" y="158" text-anchor="middle" font-family="monospace" fill="#334155" font-size="11">projects</text>
  <text x="680" y="178" text-anchor="middle" font-family="monospace" fill="#334155" font-size="11">tasks</text>
  <text x="680" y="198" text-anchor="middle" font-family="monospace" fill="#334155" font-size="11">users</text>
  <text x="680" y="218" text-anchor="middle" font-family="monospace" fill="#334155" font-size="11">project_user</text>
  <text x="680" y="240" text-anchor="middle" font-family="monospace" fill="#64748b" font-size="9">(جداول حقيقية)</text>

  <!-- Bottom tagline -->
  <rect x="20" y="275" width="760" height="20" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="289" text-anchor="middle" font-family="Tajawal, sans-serif" fill="#64748b" font-size="10">
    المطور يكتب PHP (سهل) ← Eloquent يترجم ← MySQL ينفذ (فعال) | بدون ORM: المطور يكتب SQL يدوياً (صعب)
  </text>
</svg>
