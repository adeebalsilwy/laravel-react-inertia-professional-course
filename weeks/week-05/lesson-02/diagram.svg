<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#f1f5f9" rx="20"/>
  
  <!-- Kanban flow -->
  <g transform="translate(50, 80)">
    <rect width="200" height="180" rx="10" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
    <rect x="10" y="5" width="180" height="30" rx="5" fill="#f1f5f9"/>
    <text x="100" y="25" text-anchor="middle" font-weight="bold" font-size="12">To Do (للقيام)</text>
    <rect x="20" y="50" width="160" height="40" rx="5" fill="#e2e8f0"/>
  </g>
  
  <g transform="translate(300, 80)">
    <rect width="200" height="180" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="10" y="5" width="180" height="30" rx="5" fill="#dbeafe"/>
    <text x="100" y="25" text-anchor="middle" font-weight="bold" font-size="12" fill="#1e40af">Doing (قيد التنفيذ)</text>
    <rect x="20" y="50" width="160" height="40" rx="5" fill="#bfdbfe"/>
  </g>
  
  <g transform="translate(550, 80)">
    <rect width="200" height="180" rx="10" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <rect x="10" y="5" width="180" height="30" rx="5" fill="#d1fae5"/>
    <text x="100" y="25" text-anchor="middle" font-weight="bold" font-size="12" fill="#065f46">Done (منجز)</text>
    <rect x="20" y="50" width="160" height="40" rx="5" fill="#a7f3d0"/>
  </g>
  
  <text x="400" y="40" text-anchor="middle" font-weight="bold" font-size="22" fill="#1e293b">هيكل لوحة الكانبان (Kanban Board)</text>
</svg>