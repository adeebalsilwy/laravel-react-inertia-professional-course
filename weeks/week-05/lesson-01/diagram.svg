<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc" rx="20"/>
  
  <!-- CRUD Cycle -->
  <circle cx="400" cy="220" r="120" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="10 5"/>
  
  <g transform="translate(340, 60)">
    <rect width="120" height="60" rx="10" fill="#10b981" />
    <text x="60" y="35" text-anchor="middle" fill="white" font-weight="bold">Create</text>
  </g>
  
  <g transform="translate(560, 190)">
    <rect width="120" height="60" rx="10" fill="#3b82f6" />
    <text x="60" y="35" text-anchor="middle" fill="white" font-weight="bold">Read</text>
  </g>
  
  <g transform="translate(340, 320)">
    <rect width="120" height="60" rx="10" fill="#f59e0b" />
    <text x="60" y="35" text-anchor="middle" fill="white" font-weight="bold">Update</text>
  </g>
  
  <g transform="translate(120, 190)">
    <rect width="120" height="60" rx="10" fill="#ef4444" />
    <text x="60" y="35" text-anchor="middle" fill="white" font-weight="bold">Delete</text>
  </g>
  
  <text x="400" y="40" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#0f172a">دورة حياة البيانات (CRUD)</text>
</svg>