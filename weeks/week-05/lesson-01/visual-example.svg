<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" rx="20" fill="#f8fafc"/>
  <text x="400" y="40" text-anchor="middle" font-family="Tajawal, Arial" font-size="20" font-weight="800" fill="#0f172a">مشاهدة CRUD عملياً في FlowPilot</text>

  <!-- User icon -->
  <circle cx="80" cy="150" r="40" fill="#dbeafe"/>
  <text x="80" y="156" text-anchor="middle" font-family="Tajawal, Arial" font-size="16" font-weight="700" fill="#1e40af">مستخدم</text>

  <!-- Arrow -->
  <path d="M120 150 L180 150" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Browser -->
  <rect x="185" y="90" width="200" height="120" rx="16" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="285" y="130" text-anchor="middle" font-family="Tajawal, Arial" font-size="14" font-weight="700" fill="#4338ca">واجهة React</text>
  <text x="285" y="155" text-anchor="middle" font-family="Tajawal, Arial" font-size="11" fill="#64748b">زر "إضافة مشروع"</text>
  <text x="285" y="175" text-anchor="middle" font-family="Tajawal, Arial" font-size="11" fill="#64748b">قائمة المشاريع</text>
  <text x="285" y="195" text-anchor="middle" font-family="Tajawal, Arial" font-size="11" fill="#64748b">أزرار تعديل وحذف</text>

  <!-- Arrow -->
  <path d="M385 150 L445 150" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Inertia -->
  <rect x="450" y="90" width="180" height="120" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="540" y="125" text-anchor="middle" font-family="Tajawal, Arial" font-size="14" font-weight="700" fill="#0891b2">Inertia.js</text>
  <text x="540" y="148" text-anchor="middle" font-family="Tajawal, Arial" font-size="11" fill="#64748b">يترجم الطلبات</text>
  <text x="540" y="168" text-anchor="middle" font-family="Tajawal, Arial" font-size="11" fill="#64748b">بدون إعادة تحميل</text>
  <text x="540" y="188" text-anchor="middle" font-family="Tajawal, Arial" font-size="11" fill="#64748b">JSON ← HTTP</text>

  <!-- Arrow -->
  <path d="M630 150 L690 150" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Laravel -->
  <rect x="695" y="90" width="100" height="120" rx="16" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="745" y="130" text-anchor="middle" font-family="Tajawal, Arial" font-size="14" font-weight="700" fill="#be185d">Laravel</text>
  <text x="745" y="155" text-anchor="middle" font-family="Tajawal, Arial" font-size="11" fill="#64748b">Controller</text>
  <text x="745" y="175" text-anchor="middle" font-family="Tajawal, Arial" font-size="11" fill="#64748b">Model</text>
  <text x="745" y="195" text-anchor="middle" font-family="Tajawal, Arial" font-size="11" fill="#64748b">DB</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f172a"/></marker>
  </defs>
</svg>