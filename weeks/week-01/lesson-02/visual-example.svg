<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#f5f3ff" rx="20"/>
  
  <!-- Restaurant Analogy -->
  <g transform="translate(100, 80)">
    <rect width="180" height="140" rx="10" fill="white" stroke="#6366f1" stroke-width="2"/>
    <text x="90" y="40" text-anchor="middle" font-weight="bold">المطبخ</text>
    <text x="90" y="70" text-anchor="middle" font-size="12" fill="#4338ca">الخلفية (Laravel)</text>
    <text x="90" y="100" text-anchor="middle" font-size="10" fill="#64748b">تجهيز البيانات</text>
  </g>
  
  <g transform="translate(520, 80)">
    <rect width="180" height="140" rx="10" fill="white" stroke="#6366f1" stroke-width="2"/>
    <text x="90" y="40" text-anchor="middle" font-weight="bold">طاولة التقديم</text>
    <text x="90" y="70" text-anchor="middle" font-size="12" fill="#4338ca">الواجهة (React)</text>
    <text x="90" y="100" text-anchor="middle" font-size="10" fill="#64748b">تفاعل المستخدم</text>
  </g>
  
  <path d="M 290 150 L 510 150" stroke="#6366f1" stroke-width="4" stroke-dasharray="10 5"/>
  <text x="400" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">النادل (Inertia)</text>
  
  <text x="400" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#4c1d95">تشبيه المطعم لربط التقنيات</text>
</svg>