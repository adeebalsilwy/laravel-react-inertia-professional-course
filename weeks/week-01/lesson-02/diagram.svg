<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#f0fdf4" rx="20"/>
  
  <!-- Server Side -->
  <rect x="50" y="100" width="200" height="120" rx="15" fill="#ffffff" stroke="#10b981" stroke-width="3"/>
  <text x="150" y="145" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#065f46">Laravel</text>
  <text x="150" y="175" text-anchor="middle" font-size="14" fill="#34d399">المنطق والبيانات</text>
  
  <!-- The Bridge -->
  <rect x="300" y="120" width="200" height="80" rx="40" fill="#6366f1" />
  <text x="400" y="165" text-anchor="middle" font-family="Arial" font-weight="bold" fill="white">Inertia.js</text>
  <text x="400" y="185" text-anchor="middle" font-size="10" fill="#e0e7ff">جسر التواصل</text>
  
  <!-- Client Side -->
  <rect x="550" y="100" width="200" height="120" rx="15" fill="#ffffff" stroke="#0ea5e9" stroke-width="3"/>
  <text x="650" y="145" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#0369a1">React</text>
  <text x="650" y="175" text-anchor="middle" font-size="14" fill="#38bdf8">الواجهة والتفاعل</text>
  
  <path d="M 250 160 L 290 160" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow-green)"/>
  <path d="M 510 160 L 540 160" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow-blue)"/>
  
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#10b981" /></marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0ea5e9" /></marker>
  </defs>
  
  <text x="400" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#065f46">كيف تترابط التقنيات في FlowPilot؟</text>
</svg>