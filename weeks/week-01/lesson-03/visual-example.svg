<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fef2f2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" rx="24"/>
  
  <text x="400" y="40" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="22" fill="#7c2d12">تشبيه مكعبات الليغو (Lego) لشرح Utility-First CSS</text>
  <text x="400" y="62" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="12" fill="#64748b">كل قطعة Lego = كلاس Tailwind واحد. اربطهم معاً لتحصل على تصميم متكامل.</text>

  <!-- Lego bricks scattered (represents individual Tailwind classes) -->
  <g transform="translate(50, 80)">
    <!-- Red brick (bg-white) -->
    <rect x="0" y="0" width="80" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="20" cy="30" r="3" fill="#cbd5e1"/>
    <circle cx="40" cy="30" r="3" fill="#cbd5e1"/>
    <circle cx="60" cy="30" r="3" fill="#cbd5e1"/>
    <text x="40" y="19" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="8" fill="#0f172a">bg-white</text>
  </g>

  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="80" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="20" cy="30" r="3" fill="#cbd5e1"/>
    <circle cx="40" cy="30" r="3" fill="#cbd5e1"/>
    <circle cx="60" cy="30" r="3" fill="#cbd5e1"/>
    <text x="40" y="19" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="8" fill="#0f172a">p-6</text>
  </g>

  <g transform="translate(50, 160)">
    <rect x="0" y="0" width="80" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="20" cy="30" r="3" fill="#cbd5e1"/>
    <circle cx="40" cy="30" r="3" fill="#cbd5e1"/>
    <circle cx="60" cy="30" r="3" fill="#cbd5e1"/>
    <text x="40" y="19" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="8" fill="#0f172a">rounded-2xl</text>
  </g>

  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="80" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="20" cy="30" r="3" fill="#cbd5e1"/>
    <circle cx="40" cy="30" r="3" fill="#cbd5e1"/>
    <circle cx="60" cy="30" r="3" fill="#cbd5e1"/>
    <text x="40" y="19" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="8" fill="#0f172a">shadow-lg</text>
  </g>

  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="80" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="20" cy="30" r="3" fill="#cbd5e1"/>
    <circle cx="40" cy="30" r="3" fill="#cbd5e1"/>
    <circle cx="60" cy="30" r="3" fill="#cbd5e1"/>
    <text x="40" y="19" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="8" fill="#0f172a">text-center</text>
  </g>

  <!-- Plus signs -->
  <text x="150" y="120" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#94a3b8">+</text>
  <text x="150" y="160" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#94a3b8">+</text>
  <text x="150" y="200" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#94a3b8">+</text>
  <text x="150" y="240" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#94a3b8">+</text>

  <!-- Arrow -->
  <path d="M 180 160 L 230 160" stroke="#6366f1" stroke-width="3" marker-end="url(#arrow-blue)" fill="none"/>

  <!-- Resulting Card -->
  <g transform="translate(250, 80)">
    <rect width="220" height="160" rx="16" fill="white" stroke="#6366f1" stroke-width="3" filter="url(#shadow)"/>
    <rect x="20" y="15" width="180" height="20" rx="4" fill="#eef2ff"/>
    <text x="110" y="29" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="10" fill="#4338ca">بطاقة باستخدام كلاسات Tailwind</text>
    <text x="110" y="65" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="14" fill="#0f172a">FlowPilot</text>
    <text x="110" y="90" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#64748b">هذه بطاقة مصممة بالكامل</text>
    <text x="110" y="108" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#64748b">بدون كتابة CSS واحد!</text>
    <rect x="55" y="125" width="110" height="25" rx="8" fill="#6366f1"/>
    <text x="110" y="142" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="10" fill="white"> bg-white p-6 rounded-2xl shadow-lg text-center</text>
  </g>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- comparison table at bottom -->
  <g transform="translate(60, 290)">
    <rect width="680" height="85" rx="14" fill="white" filter="url(#shadow)"/>
    
    <text x="340" y="22" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="12" fill="#334155">الطريقة القديمة (CSS التقليدي) ← ملف منفصل، أسماء كلاسات يدوية</text>
    <text x="340" y="44" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="12" fill="#6366f1">الطريقة الجديدة (Tailwind) ← كلاسات جاهزة، كل شيء في مكان واحد</text>
    <text x="340" y="70" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="11" fill="#64748b">مثل Lego: كل قطعة صغيرة لكنها قوية، تجميعها يبني أشياء رائعة!</text>
  </g>
</svg>