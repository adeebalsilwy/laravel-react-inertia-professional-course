<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>كويز الدرس 3: أساسيات Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-['Tajawal',sans-serif]">

<header class="glass sticky top-0 z-50 border-b border-slate-200/70">
    <div class="mx-auto max-w-7xl px-4 py-3 flex items-center justify-between gap-4">
        <a href="../../../index.html" class="font-black text-2xl text-slate-900">FlowPilot <span class="text-indigo-600">Academy</span></a>
    </div>
</header>

<main class="mx-auto max-w-2xl px-4 py-12">
    <a class="font-black text-indigo-700 hover:underline inline-block mb-8" href="index.html">← العودة للدرس</a>
    
    <div class="space-y-12">
        <div class="text-center">
            <h1 class="text-3xl font-black">كويز Tailwind CSS 🧠</h1>
            <p class="text-slate-500 mt-2">اختبر سرعتك في فهم الكلاسات الجاهزة.</p>
        </div>

        <div class="space-y-8">
            <div class="card p-8 space-y-6 shadow-sm">
                <p class="font-black text-xl leading-relaxed">1. ماذا يفعل الكلاس `rounded-full` في Tailwind؟</p>
                <div class="grid gap-3">
                    <button onclick="mark(this, true)" class="option-btn">يجعل حواف العنصر دائرية تماماً (شكل دائرة)</button>
                    <button onclick="mark(this, false)" class="option-btn">يغير لون النص إلى الأحمر</button>
                    <button onclick="mark(this, false)" class="option-btn">يجعل الخط عريضاً</button>
                </div>
            </div>

            <div class="card p-8 space-y-6 shadow-sm">
                <p class="font-black text-xl leading-relaxed">2. أي كلاس يستخدم لإضافة مسافة "داخلية" (Padding) للعنصر؟</p>
                <div class="grid gap-3">
                    <button onclick="mark(this, false)" class="option-btn">m-4</button>
                    <button onclick="mark(this, true)" class="option-btn">p-4</button>
                    <button onclick="mark(this, false)" class="option-btn">w-4</button>
                </div>
            </div>
        </div>

        <div id="result-box" class="hidden card p-8 bg-indigo-600 text-white text-center animate-bounce">
            <p class="text-2xl font-black">ممتاز! أنت مصمم واجهات واعد 🚀</p>
        </div>
    </div>
</main>

<style>
    .option-btn {
        @apply w-full text-right p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-300 transition-all font-bold;
    }
    .is-correct {
        @apply bg-emerald-50 border-emerald-500 text-emerald-700;
    }
    .is-wrong {
        @apply bg-rose-50 border-rose-500 text-rose-700;
    }
</style>

<script>
    function mark(btn, correct) {
        if (btn.parentElement.dataset.done) return;
        btn.parentElement.dataset.done = "true";
        
        if (correct) {
            btn.classList.add('is-correct');
            if (document.querySelectorAll('.is-correct').length === 2) {
                document.getElementById('result-box').classList.remove('hidden');
            }
        } else {
            btn.classList.add('is-wrong');
        }
    }
</script>
</body>
</html>
