<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bg-grad)" rx="24"/>

  <text x="400" y="40" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="22" fill="#0f172a">علاقة كلاسات Tailwind بالخصائص CSS الفعلية</text>

  <!-- Left: JSX Code -->
  <g transform="translate(30, 70)">
    <rect width="350" height="200" rx="16" fill="#1e293b" filter="url(#shadow)"/>
    <text x="175" y="25" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="14" fill="#94a3b8">كود JSX مع كلاسات Tailwind</text>
    <text x="175" y="50" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#e2e8f0">&lt;div</text>
    <text x="175" y="68" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#eab308">&nbsp;&nbsp;className=</text>
    <text x="175" y="86" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#22c55e">"</text>
    <text x="175" y="104" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#22c55e">bg-white</text>
    <text x="175" y="122" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#60a5fa">p-6</text>
    <text x="175" y="140" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#f472b6">rounded-2xl</text>
    <text x="175" y="158" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#a78bfa">shadow-lg</text>
    <text x="175" y="176" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#22c55e">"</text>
    <text x="175" y="194" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#e2e8f0">&gt;محتوى&lt;/div&gt;</text>
  </g>

  <!-- Arrows going right -->
  <path d="M 380 110 L 420 110" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  <path d="M 380 150 L 420 150" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  <path d="M 380 190 L 420 190" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>

  <!-- Right: CSS Properties -->
  <g transform="translate(430, 70)">
    <rect width="340" height="200" rx="16" fill="white" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
    <text x="170" y="25" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="14" fill="#4338ca">خصائص CSS الفعلية المطبقة</text>
    
    <rect x="15" y="40" width="310" height="35" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="20" y="63" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#065f46">background-color: white;</text>

    <rect x="15" y="80" width="310" height="35" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="20" y="103" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#1e40af">padding: 24px;</text>

    <rect x="15" y="120" width="310" height="35" rx="8" fill="#fdf2f8" stroke="#ec4899" stroke-width="1"/>
    <text x="20" y="143" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#be185d">border-radius: 16px;</text>

    <rect x="15" y="160" width="310" height="35" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
    <text x="20" y="183" font-family="Courier, monospace" font-weight="bold" font-size="11" fill="#6d28d9">box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Bottom explanation -->
  <g transform="translate(30, 290)">
    <rect width="740" height="85" rx="14" fill="white" filter="url(#shadow)"/>
    <text x="370" y="22" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="13" fill="#334155">كيف تقرأ كلاس Tailwind؟</text>
    <text x="370" y="45" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="11" fill="#64748b">bg-white ← bg (background) + white (اللون الأبيض)</text>
    <text x="370" y="62" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="11" fill="#64748b">كل كلاس = خاصية CSS واحدة + قيمتها. اجمع كلاسات متعددة لتحصل على تصميم معقد!</text>
  </g>
</svg>