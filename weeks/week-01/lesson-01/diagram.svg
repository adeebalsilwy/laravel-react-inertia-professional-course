<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc" rx="20"/>
  
  <!-- Central Hub: PC -->
  <rect x="325" y="150" width="150" height="100" rx="10" fill="#1e293b" />
  <text x="400" y="210" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold" font-size="20">الجهاز المحلي</text>
  
  <!-- PHP -->
  <circle cx="150" cy="100" r="50" fill="#4f46e5" fill-opacity="0.1" stroke="#4f46e5" stroke-width="2"/>
  <text x="150" y="105" text-anchor="middle" fill="#4f46e5" font-family="Arial" font-weight="bold">PHP 8.2+</text>
  <path d="M 200 115 L 325 170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Composer -->
  <circle cx="150" cy="300" r="50" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-width="2"/>
  <text x="150" y="305" text-anchor="middle" fill="#0ea5e9" font-family="Arial" font-weight="bold">Composer</text>
  <path d="M 200 285 L 325 230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Node.js -->
  <circle cx="650" cy="100" r="50" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2"/>
  <text x="650" y="105" text-anchor="middle" fill="#10b981" font-family="Arial" font-weight="bold">Node.js</text>
  <path d="M 600 115 L 475 170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Git -->
  <circle cx="650" cy="300" r="50" fill="#f43f5e" fill-opacity="0.1" stroke="#f43f5e" stroke-width="2"/>
  <text x="650" y="305" text-anchor="middle" fill="#f43f5e" font-family="Arial" font-weight="bold">Git</text>
  <path d="M 600 285 L 475 230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
  
  <text x="400" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="24" fill="#0f172a">مخطط بيئة العمل المتكاملة</text>
</svg>