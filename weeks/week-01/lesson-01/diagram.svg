<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1" />
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg-grad)" rx="24"/>
  
  <text x="400" y="45" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="24" fill="#0f172a">مخطط بيئة العمل المتكاملة لتطوير FlowPilot</text>
  <text x="400" y="70" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="13" fill="#64748b">كل أداة ترتبط بالأخرى لتشكل بيئة تطوير متكاملة</text>

  <!-- Central Hub: The Computer -->
  <rect x="275" y="190" width="250" height="110" rx="16" fill="#1e293b" filter="url(#shadow)"/>
  <text x="400" y="235" text-anchor="middle" fill="white" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="18">جهاز الكمبيوتر</text>
  <text x="400" y="260" text-anchor="middle" fill="#94a3b8" font-family="Tajawal, Arial, sans-serif" font-size="12">بيئة العمل المحلية (Local)</text>
  <text x="400" y="280" text-anchor="middle" fill="#6366f1" font-family="Tajawal, Arial, sans-serif" font-size="11">◉ FlowPilot Academy</text>

  <!-- PHP -->
  <g transform="translate(60, 100)">
    <circle cx="50" cy="50" r="48" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/>
    <text x="50" y="45" text-anchor="middle" fill="#4338ca" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="14">PHP</text>
    <text x="50" y="65" text-anchor="middle" fill="#6366f1" font-family="Tajawal, Arial, sans-serif" font-size="11">8.2+</text>
    <path d="M 98 50 L 270 200" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  </g>

  <!-- Composer -->
  <g transform="translate(60, 270)">
    <circle cx="50" cy="50" r="48" fill="#ecfeff" stroke="#14b8a6" stroke-width="3"/>
    <text x="50" y="45" text-anchor="middle" fill="#0f766e" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="14">Composer</text>
    <text x="50" y="65" text-anchor="middle" fill="#14b8a6" font-family="Tajawal, Arial, sans-serif" font-size="11">مدير الحزم</text>
    <path d="M 98 50 L 270 220" stroke="#14b8a6" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  </g>

  <!-- Node.js -->
  <g transform="translate(540, 100)">
    <circle cx="50" cy="50" r="48" fill="#f0fdf4" stroke="#22c55e" stroke-width="3"/>
    <text x="50" y="45" text-anchor="middle" fill="#15803d" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="13">Node.js</text>
    <text x="50" y="65" text-anchor="middle" fill="#22c55e" font-family="Tajawal, Arial, sans-serif" font-size="11">18+</text>
    <path d="M 98 50 L 270 200" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  </g>

  <!-- NPM -->
  <g transform="translate(540, 200)">
    <circle cx="50" cy="50" r="48" fill="#fdf2f8" stroke="#ec4899" stroke-width="3"/>
    <text x="50" y="45" text-anchor="middle" fill="#be185d" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="14">NPM</text>
    <text x="50" y="65" text-anchor="middle" fill="#ec4899" font-family="Tajawal, Arial, sans-serif" font-size="11">مكتبات JS</text>
    <path d="M 98 50 L 270 220" stroke="#ec4899" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  </g>

  <!-- Git -->
  <g transform="translate(540, 340)">
    <circle cx="50" cy="50" r="48" fill="#fef2f2" stroke="#ef4444" stroke-width="3"/>
    <text x="50" y="45" text-anchor="middle" fill="#991b1b" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="14">Git</text>
    <text x="50" y="65" text-anchor="middle" fill="#ef4444" font-family="Tajawal, Arial, sans-serif" font-size="11">التحكم بالإصدارات</text>
    <path d="M 98 50 L 270 260" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  </g>

  <!-- VS Code -->
  <g transform="translate(60, 340)">
    <circle cx="50" cy="50" r="48" fill="#fefce8" stroke="#eab308" stroke-width="3"/>
    <text x="50" y="42" text-anchor="middle" fill="#854d0e" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="12">VS Code</text>
    <text x="50" y="62" text-anchor="middle" fill="#eab308" font-family="Tajawal, Arial, sans-serif" font-size="10">محرر الكود</text>
    <path d="M 98 50 L 270 260" stroke="#eab308" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  </g>

  <text x="400" y="420" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="13" fill="#334155" font-weight="700">جميع الأدوات تتصل بالجهاز المركزي الذي سيعمل عليه مشروع FlowPilot</text>
</svg>