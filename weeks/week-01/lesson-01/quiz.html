<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>كويز الدرس 1: تهيئة البيئة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-['Tajawal',sans-serif]">

<header class="glass sticky top-0 z-50 border-b border-slate-200/70">
    <div class="mx-auto max-w-7xl px-4 py-3 flex items-center justify-between gap-4">
        <a href="../../../index.html" class="font-black text-2xl text-slate-900">FlowPilot <span class="text-indigo-600">Academy</span></a>
    </div>
</header>

<main class="mx-auto max-w-3xl px-4 py-12">
    <a class="font-black text-indigo-700 hover:underline" href="index.html">← العودة للدرس</a>
    
    <div class="mt-8 space-y-12">
        <div class="text-center space-y-4">
            <h1 class="text-3xl font-black">اختبر معلوماتك (Lesson 01)</h1>
            <p class="text-slate-600">هذا الكويز يقيس مدى استيعابك للمفاهيم الأساسية قبل الانتقال للكود.</p>
        </div>

        <div id="quiz-container" class="space-y-8">
            <!-- Question 1 -->
            <div class="card p-8 space-y-6">
                <p class="font-black text-xl leading-relaxed">1. ما هي الوظيفة الأساسية لـ Composer في مشروع FlowPilot؟</p>
                <div class="space-y-3">
                    <button onclick="checkAnswer(this, false)" class="w-full text-right p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-300 transition-all font-bold">تعديل صور المشروع</button>
                    <button onclick="checkAnswer(this, true)" class="w-full text-right p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-300 transition-all font-bold">إدارة وجلب مكتبات لغة PHP</button>
                    <button onclick="checkAnswer(this, false)" class="w-full text-right p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-300 transition-all font-bold">تشغيل متصفح الإنترنت</button>
                </div>
            </div>

            <!-- Question 2 -->
            <div class="card p-8 space-y-6">
                <p class="font-black text-xl leading-relaxed">2. لماذا نحتاج لتثبيت Node.js رغم أننا نبرمج بلغة PHP؟</p>
                <div class="space-y-3">
                    <button onclick="checkAnswer(this, true)" class="w-full text-right p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-300 transition-all font-bold">لمعالجة وبناء ملفات واجهة المستخدم (React & Tailwind)</button>
                    <button onclick="checkAnswer(this, false)" class="w-full text-right p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-300 transition-all font-bold">لأنها أسرع من PHP في قواعد البيانات</button>
                    <button onclick="checkAnswer(this, false)" class="w-full text-right p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-300 transition-all font-bold">لتشغيل خادم البريد الإلكتروني</button>
                </div>
            </div>

            <!-- Question 3 -->
            <div class="card p-8 space-y-6 text-center">
                <p class="font-black text-xl">درجتك النهائية</p>
                <div id="score" class="text-5xl font-black text-indigo-600">--</div>
                <p id="feedback" class="text-slate-500 font-bold italic"></p>
            </div>
        </div>
    </div>
</main>

<script>
    let correctAnswers = 0;
    let totalQuestions = 2;
    let answeredCount = 0;

    function checkAnswer(btn, isCorrect) {
        if (btn.parentElement.dataset.answered) return;
        
        btn.parentElement.dataset.answered = "true";
        answeredCount++;

        if (isCorrect) {
            correctAnswers++;
            btn.classList.remove('border-slate-100');
            btn.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700');
        } else {
            btn.classList.remove('border-slate-100');
            btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
        }

        if (answeredCount === totalQuestions) {
            document.getElementById('score').innerText = correctAnswers + ' / ' + totalQuestions;
            document.getElementById('feedback').innerText = correctAnswers === totalQuestions ? "أحسنت! أنت مستعد تماماً." : "جيد، راجع المفاهيم التي أخطأت بها.";
        }
    }
</script>
</body>
</html>
