<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fef2f2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="url(#bg-grad)" rx="24"/>

  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="22" fill="#0f172a">سير عمل Git: من الملفات إلى الـ Commit</text>
  <text x="400" y="58" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="12" fill="#64748b">الملفات على جهازك ← Staging Area ← Commit (لقطة محفوظة)</text>

  <!-- Working Directory -->
  <g transform="translate(40, 80)">
    <rect width="220" height="120" rx="14" fill="white" stroke="#94a3b8" stroke-width="3" filter="url(#shadow)"/>
    <text x="110" y="30" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="14" fill="#334155">💻 Working Directory</text>
    <text x="110" y="55" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#64748b">الملفات على جهازك</text>
    <text x="110" y="75" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#64748b">(app/, routes/, resources/...)</text>
    <text x="110" y="100" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="9" fill="#94a3b8">تعدل الملفات وتجرب</text>
  </g>

  <!-- Arrow -->
  <path d="M 260 140 L 310 140" stroke="#6366f1" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <text x="285" y="130" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="10" fill="#6366f1">git add</text>

  <!-- Staging Area -->
  <g transform="translate(320, 80)">
    <rect width="200" height="120" rx="14" fill="white" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/>
    <text x="100" y="30" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="14" fill="#92400e">📋 Staging Area</text>
    <text x="100" y="55" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#a16207">منطقة الإعداد</text>
    <text x="100" y="75" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#a16207">تختار الملفات</text>
    <text x="100" y="95" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#a16207">التي تريد حفظها</text>
    <text x="100" y="115" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="9" fill="#d97706">Staging = جاهز للحفظ</text>
  </g>

  <!-- Arrow -->
  <path d="M 520 140 L 570 140" stroke="#6366f1" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <text x="545" y="130" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="10" fill="#6366f1">git commit</text>

  <!-- Commit -->
  <g transform="translate(580, 80)">
    <rect width="180" height="120" rx="14" fill="white" stroke="#10b981" stroke-width="3" filter="url(#shadow)"/>
    <text x="90" y="30" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="14" fill="#065f46">💾 Commit</text>
    <text x="90" y="55" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#065f46">لقطة محفوظة</text>
    <text x="90" y="75" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#065f46">في المستودع</text>
    <text x="90" y="100" text-anchor="middle" font-family="Courier, monospace" font-weight="bold" font-size="9" fill="#10b981">✓ محفوظ للأبد</text>
  </g>

  <!-- Bottom: .gitignore explanation -->
  <g transform="translate(40, 230)">
    <rect width="720" height="150" rx="14" fill="white" filter="url(#shadow)"/>
    <text x="360" y="25" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="14" fill="#334155">دور ملف .gitignore</text>
    
    <!-- Without .gitignore -->
    <rect x="15" y="40" width="335" height="95" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="180" y="62" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="11" fill="#991b1b">❌ بدون .gitignore</text>
    <text x="180" y="82" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#b91c1c">Git سيحاول تتبع</text>
    <text x="180" y="100" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#b91c1c">vendor/ (آلاف الملفات)</text>
    <text x="180" y="118" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#b91c1c">node_modules/ (مئات الآلاف)</text>

    <!-- With .gitignore -->
    <rect x="370" y="40" width="335" height="95" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="537" y="62" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="11" fill="#065f46">✅ مع .gitignore</text>
    <text x="537" y="82" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#047857">Git يتجاهل vendor/ و node_modules/</text>
    <text x="537" y="100" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#047857">و .env تلقائياً</text>
    <text x="537" y="118" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#047857">Commit سريع ونظيف</text>
  </g>

  <text x="400" y="395" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="11" fill="#334155" font-weight="700">Commit = لقطة سريعة للمشروع. Staging = تختار ما تلتقط. .gitignore = تحدد ما لا تصوّره!</text>
</svg>