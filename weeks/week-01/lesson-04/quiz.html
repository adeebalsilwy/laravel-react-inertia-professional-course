<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>كويز الدرس 4: احترافية Git</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-['Tajawal',sans-serif]">

<header class="glass sticky top-0 z-50 border-b border-slate-200/70">
    <div class="mx-auto max-w-7xl px-4 py-3 flex items-center justify-between gap-4">
        <a href="../../../index.html" class="font-black text-2xl text-slate-900">FlowPilot <span class="text-indigo-600">Academy</span></a>
    </div>
</header>

<main class="mx-auto max-w-2xl px-4 py-12">
    <a class="font-black text-indigo-700 hover:underline inline-block mb-8" href="index.html">← العودة للدرس</a>
    
    <div class="space-y-12">
        <div class="text-center">
            <h1 class="text-3xl font-black">كويز Git & Clean Code 🚀</h1>
        </div>

        <div class="space-y-8">
            <div class="card p-8 space-y-6 shadow-sm">
                <p class="font-black text-xl leading-relaxed">1. أي أمر يستخدم "لحفظ" التغييرات بشكل دائم في تاريخ المشروع؟</p>
                <div class="grid gap-3">
                    <button onclick="mark(this, false)" class="p-4 rounded-2xl border-2 border-slate-100 font-bold text-right">git add</button>
                    <button onclick="mark(this, true)" class="p-4 rounded-2xl border-2 border-slate-100 font-bold text-right">git commit</button>
                    <button onclick="mark(this, false)" class="p-4 rounded-2xl border-2 border-slate-100 font-bold text-right">git init</button>
                </div>
            </div>

            <div class="card p-8 space-y-6 shadow-sm">
                <p class="font-black text-xl leading-relaxed">2. ما فائدة كتابة الكود النظيف (Clean Code)؟</p>
                <div class="grid gap-3">
                    <button onclick="mark(this, false)" class="p-4 rounded-2xl border-2 border-slate-100 font-bold text-right">لزيادة عدد الأسطر في المشروع</button>
                    <button onclick="mark(this, true)" class="p-4 rounded-2xl border-2 border-slate-100 font-bold text-right">ليسهل فهم الكود وتطويره بواسطة أي مبرمج آخر</button>
                </div>
            </div>
        </div>

        <div id="final-msg" class="hidden text-center p-8 rounded-3xl bg-emerald-600 text-white">
            <h2 class="text-3xl font-black italic">أنت مطور محترف الآن!</h2>
        </div>
    </div>
</main>

<script>
    function mark(btn, correct) {
        if (btn.parentElement.dataset.done) return;
        btn.parentElement.dataset.done = "true";
        if (correct) {
            btn.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700');
            if (document.querySelectorAll('.bg-emerald-50').length === 2) {
                document.getElementById('final-msg').classList.remove('hidden');
            }
        } else {
            btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
        }
    }
</script>
</body>
</html>
