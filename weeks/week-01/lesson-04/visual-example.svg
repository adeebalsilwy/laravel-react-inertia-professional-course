<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="800" height="380" fill="url(#bg)" rx="24"/>
  
  <text x="400" y="35" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="22" fill="#0f172a">تشبيه حفظ لعبة الفيديو بـ Git Commits</text>
  <text x="400" y="58" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="12" fill="#64748b">كل Commit هو Save Point في لعبتك. كل Branch هو ملف حفظ منفصل.</text>

  <!-- Game Analogy -->
  <!-- Level 1 -->
  <g transform="translate(40, 80)">
    <rect width="220" height="130" rx="14" fill="white" stroke="#6366f1" stroke-width="3" filter="url(#shadow)"/>
    <text x="110" y="30" text-anchor="middle" font-size="28">🎮</text>
    <text x="110" y="60" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="13" fill="#4338ca">المرحلة 1: البداية</text>
    <text x="110" y="82" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#64748b">تجهيز الأسلحة (Install)</text>
    <text x="110" y="100" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#64748b">💾 Save 1 (Commit 1)</text>
    <text x="110" y="118" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="8" fill="#6366f1">git commit -m "تجهيز البيئة"</text>
  </g>

  <!-- Arrow -->
  <path d="M 260 145 L 295 145" stroke="#6366f1" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <!-- Level 2 -->
  <g transform="translate(300, 80)">
    <rect width="220" height="130" rx="14" fill="white" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)"/>
    <text x="110" y="30" text-anchor="middle" font-size="28">🏰</text>
    <text x="110" y="60" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="13" fill="#92400e">المرحلة 2: القلعة</text>
    <text x="110" y="82" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#64748b">بناء القلعة (Laravel)</text>
    <text x="110" y="100" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#64748b">💾 Save 2 (Commit 2)</text>
    <text x="110" y="118" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="8" fill="#d97706">git commit -m "تثبيت Laravel"</text>
  </g>

  <!-- Arrow -->
  <path d="M 520 145 L 555 145" stroke="#6366f1" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <!-- Level 3 -->
  <g transform="translate(560, 80)">
    <rect width="200" height="130" rx="14" fill="white" stroke="#10b981" stroke-width="3" filter="url(#shadow)"/>
    <text x="100" y="30" text-anchor="middle" font-size="28">👑</text>
    <text x="100" y="60" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="13" fill="#065f46">المرحلة 3: الزعيم</text>
    <text x="100" y="82" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#64748b">مواجهة الوحش (Feature)</text>
    <text x="100" y="100" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#64748b">💾 Save 3 (Commit 3)</text>
    <text x="100" y="118" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="bold" font-size="8" fill="#10b981">git commit -m "إضافة الميزة"</text>
  </g>

  <!-- Branch illustration -->
  <g transform="translate(40, 240)">
    <rect width="720" height="110" rx="14" fill="white" filter="url(#shadow)"/>
    
    <text x="360" y="22" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="13" fill="#334155">مثل حفظ اللعبة في ملفات منفصلة (Branches)</text>
    
    <!-- Main branch -->
    <rect x="20" y="35" width="320" height="60" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="180" y="55" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="12" fill="#4338ca">main (الفرع الرئيسي - اللعبة الأصلية)</text>
    <text x="180" y="78" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#6366f1">commit 1 → commit 2 → commit 3 (المستقر)</text>

    <!-- Feature branch -->
    <rect x="380" y="35" width="320" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="540" y="55" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-weight="900" font-size="12" fill="#991b1b">feature-experiment (فرع التجربة)</text>
    <text x="540" y="78" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="10" fill="#ef4444">فكرة جديدة - إذا نجحت، تدمج مع main</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1"/>
    </marker>
  </defs>

  <text x="400" y="372" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="11" fill="#334155" font-weight="700">كل Commit هو Save Point. إذا مت (فسد الكود)، تحمّل آخر Save (Commit) وجرّب مجدداً!</text>
</svg>